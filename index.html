'ethical-hacker':{t:'Ethical Hacker / Pen Tester',e:'💻',c:'Tech',s:[70,110,160],d:2,tm:'6-18mo',desc:'Hack systems legally to find vulnerabilities',traits:['curious','technical','ethical'],vals:['security','puzzle-solving'],life:{r:'Sometimes',h:'40-50'},truth:['Certifications matter','Constant learning','Legal gray areas'],res:['CEH/OSCP|$1-3K','CTF practice|Free','Cybersecurity background|Helpful']},
'set-designer':{t:'Set Designer',e:'🎭',c:'Creative',s:[40,60,90],d:2,tm:'Portfolio + connections',desc:'Design sets for film, TV, theater',traits:['creative','technical','collaborative'],vals:['design','storytelling'],life:{r:'No',h:'50-70'},truth:['Project-based work','Union membership important','LA/NY for film/TV'],res:['Design degree|$40K','Portfolio|Essential','Industry connections|Key']},
'makeup-artist':{t:'Makeup Artist',e:'💄',c:'Creative',s:[25,50,100],d:1,tm:'3-12mo training',desc:'Apply makeup for film, TV, fashion, events',traits:['artistic','social','detail-oriented'],vals:['beauty','transformation'],life:{r:'No',h:'Varies'},truth:['Freelance common','Build your kit ($5K+)','Instagram is your portfolio'],res:['Makeup school|$5-15K','Kit building|$5K+','Assisting|Entry path']},
'wind-turbine-technician':{t:'Wind Turbine Technician',e:'🌬️',c:'Trades',s:[45,55,70],d:2,tm:'6mo-2yrs',desc:'Install and maintain wind turbines',traits:['physical','technical','heights-tolerant'],vals:['renewables','outdoors'],life:{r:'No',h:'40-50'},truth:['Work at extreme heights','Growing field rapidly','Rural locations'],res:['Technical training|$5-15K','Climbing certification|$500','Physical fitness|Required']},
'solar-installer':{t:'Solar Panel Installer',e:'☀️',c:'Trades',s:[35,45,60],d:1,tm:'1-6mo',desc:'Install solar panel systems',traits:['physical','technical','detail-oriented'],vals:['renewables','building'],life:{r:'No',h:'40-50'},truth:['Fast-growing field','Physical rooftop work','Can start own company'],res:['NABCEP certification|$500-1K','OJT|Entry path','Electrical knowledge|Helpful']},
'real-estate-agent':{t:'Real Estate Agent',e:'🏠',c:'Business',s:[30,60,150],d:1,tm:'1-3mo license',desc:'Help people buy and sell properties',traits:['salesperson','networker','persistent'],vals:['money','helping'],life:{r:'Sometimes',h:'Varies'},truth:['100% commission','First year is brutal','Top agents make great money'],res:['Real estate license|$500-2K','Brokerage|Join one','Sphere of influence|Build it']},
};

// Category colors
const catColors={Tech:'#3B82F6',Creative:'#8B5CF6',Consulting:'#EC4899',Entrepreneurship:'#F59E0B',Business:'#10B981',Finance:'#059669',Wellness:'#14B8A6',Healthcare:'#EF4444',Trades:'#F97316',Outdoors:'#22C55E',Education:'#6366F1',Coaching:'#A855F7',Legal:'#64748B',Government:'#0EA5E9',Food:'#EAB308',Hospitality:'#F472B6',Unique:'#7C3AED',Science:'#06B6D4'};

function App(){
  const[mode,setMode]=useState('home');
  const[step,setStep]=useState(0);
  const[filter,setFilter]=useState({cat:'',search:'',diff:'',remote:''});
  const[d,setD]=useState({name:'',email:'',role:'',skills:[],energy:{},dealBreakers:[],fin:'',urg:'',fear:'',results:[]});
  const u=x=>setD(p=>({...p,...x}));

  // Get all categories
  const categories=useMemo(()=>[...new Set(Object.values(C).map(c=>c.c))].sort(),[]);
  
  // Filter careers for browse mode
  const filtered=useMemo(()=>{
    return Object.entries(C).filter(([id,c])=>{
      if(filter.cat&&c.c!==filter.cat)return false;
      if(filter.search&&!c.t.toLowerCase().includes(filter.search.toLowerCase())&&!c.desc.toLowerCase().includes(filter.search.toLowerCase()))return false;
      if(filter.diff&&c.d!==parseInt(filter.diff))return false;
      return true;
    }).map(([id,c])=>({id,...c}));
  },[filter]);

  // Skills for quiz
  const skillOpts=['Analytical','Creative','Technical','Communication','Strategic','Sales','Empathy','Organization','Research','Leadership'];
  
  // Energy questions
  const energyQs=[
    {id:'e1',q:'Researching something fascinating',tags:['curious','analytical']},
    {id:'e2',q:'Building something tangible',tags:['builder','creative']},
    {id:'e3',q:'Helping someone through a challenge',tags:['helper','empathetic']},
    {id:'e4',q:'Organizing chaos into a system',tags:['optimizer','organized']},
    {id:'e5',q:'Presenting ideas to a group',tags:['communicator','leader']},
    {id:'e6',q:'Working alone in deep focus',tags:['specialist','analytical']},
    {id:'e7',q:'Negotiating or persuading',tags:['salesperson','communicator']},
    {id:'e8',q:'Creating something beautiful',tags:['creative','builder']},
    {id:'e9',q:'Leading a team',tags:['leader','communicator']},
    {id:'e10',q:'Solving puzzles',tags:['analytical','technical']},
  ];

  // Deal breakers
  const dbOpts=['Lots of meetings','Unstable income','Sales required','50+ hour weeks','Frequent travel','Physical labor','Advanced degree required'];

  // Calculate results
  const calc=()=>{
    const scores={};
    Object.entries(C).forEach(([id,c])=>{
      let sc=50;
      // Skill matching
      d.skills.forEach(skill=>{
        const sl=skill.toLowerCase();
        if(c.traits?.some(t=>t.includes(sl.slice(0,4))))sc+=12;
      });
      // Energy matching
      Object.entries(d.energy).forEach(([qId,rating])=>{
        const q=energyQs.find(x=>x.id===qId);
        if(q){
          const mult=(rating-3)/2;
          q.tags.forEach(tag=>{
            if(c.traits?.some(t=>t.includes(tag.slice(0,4)))||c.vals?.some(v=>v.includes(tag.slice(0,4))))sc+=mult*8;
          });
        }
      });
      // Financial constraints
      if(d.fin==='tight'&&c.d===3)sc-=20;
      if(d.fin==='tight'&&c.s?.[0]===0)sc-=25;
      // Deal breakers
      d.dealBreakers.forEach(db=>{
        if(db.includes('meeting')&&c.truth?.some(t=>t.toLowerCase().includes('meeting')))sc-=20;
        if(db.includes('Unstable')&&(c.s?.[0]===0||c.truth?.some(t=>t.toLowerCase().includes('famine'))))sc-=25;
        if(db.includes('hour')&&c.truth?.some(t=>t.includes('60')||t.includes('80')))sc-=20;
        if(db.includes('degree')&&c.d===3)sc-=15;
      });
      if(c.d===1)sc+=8;
      scores[id]=Math.max(0,Math.min(100,sc));
    });
    const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([id,score])=>({id,...C[id],score}));
    u({results:sorted});
    
    // Send to sheets
    fetch('https://script.google.com/macros/s/AKfycbxi-vcsL2izUXE-UCNb98PFbAZHWv4QFCN-WYJic-o7Qg8W04VDgOb-nrQbUJUzfxWD/exec',{
      method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:d.name,email:d.email,website:'',skills:d.skills.join(','),dealBreakers:d.dealBreakers.join(','),
        topCareer1:sorted[0]?.t||'',topCareer2:sorted[1]?.t||'',topCareer3:sorted[2]?.t||''})
    }).catch(e=>console.log(e));
    setStep(100);
  };

  // Styles
  const s={
    wrap:{minHeight:'100vh',background:t.bg,padding:20},
    cnt:{maxWidth:600,margin:'0 auto'},
    card:{background:t.card,borderRadius:16,padding:24,marginBottom:16,border:'1px solid '+t.border},
    h1:{fontSize:28,fontWeight:700,color:t.text,marginBottom:8},
    h2:{fontSize:20,fontWeight:600,color:t.text,marginBottom:16},
    p:{fontSize:15,color:t.sub,lineHeight:1.6,marginBottom:16},
    btn:{padding:'14px 24px',borderRadius:10,fontSize:15,fontWeight:600,cursor:'pointer',border:'none',width:'100%',marginBottom:12},
    btnP:{background:t.pri,color:'#fff'},
    btnS:{background:t.priL,color:t.pri},
    input:{width:'100%',padding:14,border:'1.5px solid '+t.border,borderRadius:10,fontSize:16,marginBottom:16},
    chip:{display:'inline-block',padding:'8px 16px',borderRadius:20,margin:4,cursor:'pointer',fontSize:14,border:'1.5px solid '+t.border},
    chipA:{background:t.pri,color:'#fff',border:'1.5px solid '+t.pri},
    grid:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16},
  };

  // HOME
  if(mode==='home')return(
    <div style={s.wrap}><div style={s.cnt} className="fade">
      <div style={{...s.card,textAlign:'center',padding:40}}>
        <div style={{fontSize:48,marginBottom:16}}>🧭</div>
        <h1 style={s.h1}>Career Clarity</h1>
        <p style={s.p}>Discover careers you never knew existed. 122 paths across tech, creative, healthcare, trades, and more.</p>
        <button style={{...s.btn,...s.btnP}} onClick={()=>setMode('quiz')}>Take the Quiz (3 min)</button>
        <button style={{...s.btn,...s.btnS}} onClick={()=>setMode('browse')}>Browse All 122 Careers</button>
      </div>
      <div style={s.card}>
        <h2 style={{...s.h2,fontSize:16}}>What makes this different?</h2>
        <p style={{...s.p,marginBottom:0}}>• <b>122 real careers</b> — not just "marketing" but Sommelier, Death Doula, Park Ranger, Ethical Hacker<br/>
        • <b>Honest truth bombs</b> — what nobody tells you before you commit<br/>
        • <b>Personalized matches</b> — based on your energy, values, and constraints</p>
      </div>
    </div></div>
  );

  // BROWSE
  if(mode==='browse')return(
    <div style={s.wrap}><div style={{...s.cnt,maxWidth:900}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h1 style={{...s.h1,marginBottom:0}}>Browse Careers</h1>
        <button style={{...s.btn,...s.btnS,width:'auto',marginBottom:0}} onClick={()=>setMode('home')}>← Back</button>
      </div>
      <div style={{...s.card,padding:16}}>
        <input style={{...s.input,marginBottom:8}} placeholder="Search careers..." value={filter.search} onChange={e=>setFilter(p=>({...p,search:e.target.value}))}/>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <select style={{...s.input,width:'auto',marginBottom:0}} value={filter.cat} onChange={e=>setFilter(p=>({...p,cat:e.target.value}))}>
            <option value="">All Categories</option>
            {categories.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <select style={{...s.input,width:'auto',marginBottom:0}} value={filter.diff} onChange={e=>setFilter(p=>({...p,diff:e.target.value}))}>
            <option value="">Any Difficulty</option>
            <option value="1">Easy Transition</option>
            <option value="2">Medium</option>
            <option value="3">Hard (Long path)</option>
          </select>
        </div>
      </div>
      <p style={{...s.p,marginBottom:16}}>{filtered.length} careers found</p>
      <div style={s.grid}>
        {filtered.map(c=>(
          <div key={c.id} style={s.card} className="fade">
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
              <span style={{fontSize:12,padding:'4px 10px',borderRadius:12,background:catColors[c.c]||'#888',color:'#fff'}}>{c.c}</span>
              <span style={{fontSize:13,color:t.muted}}>{c.d===1?'Easy':c.d===2?'Medium':'Hard'}</span>
            </div>
            <div style={{fontSize:24,marginBottom:4}}>{c.e} {c.t}</div>
            <p style={{fontSize:14,color:t.sub,marginBottom:12}}>{c.desc}</p>
            <div style={{fontSize:14,color:t.pri,fontWeight:600,marginBottom:8}}>${c.s?.[0]}K - ${c.s?.[2]}K+ • {c.tm}</div>
            {c.truth?.slice(0,2).map((tb,i)=><p key={i} style={{fontSize:13,color:t.muted,marginBottom:4}}>⚠️ {tb}</p>)}
          </div>
        ))}
      </div>
    </div></div>
  );

  // QUIZ
  if(mode==='quiz'){
    // Step 0: Name
    if(step===0)return(
      <div style={s.wrap}><div style={s.cnt} className="fade">
        <button style={{...s.btn,...s.btnS,width:'auto',marginBottom:20}} onClick={()=>setMode('home')}>← Back</button>
        <div style={s.card}>
          <h2 style={s.h2}>Let's start with your name</h2>
          <input style={s.input} placeholder="Your first name" value={d.name} onChange={e=>u({name:e.target.value})} onKeyDown={e=>e.key==='Enter'&&d.name&&setStep(1)}/>
          <button style={{...s.btn,...s.btnP}} disabled={!d.name} onClick={()=>setStep(1)}>Continue</button>
        </div>
      </div></div>
    );
    // Step 1: Skills
    if(step===1)return(
      <div style={s.wrap}><div style={s.cnt} className="fade">
        <div style={s.card}>
          <h2 style={s.h2}>What are you good at, {d.name}?</h2>
          <p style={s.p}>Select 3-5 that describe you best</p>
          <div style={{display:'flex',flexWrap:'wrap',marginBottom:16}}>
            {skillOpts.map(sk=>(
              <span key={sk} style={d.skills.includes(sk)?{...s.chip,...s.chipA}:s.chip}
                onClick={()=>u({skills:d.skills.includes(sk)?d.skills.filter(x=>x!==sk):[...d.skills,sk]})}>
                {sk}
              </span>
            ))}
          </div>
          <button style={{...s.btn,...s.btnP}} disabled={d.skills.length<2} onClick={()=>setStep(2)}>Continue</button>
        </div>
      </div></div>
    );
    // Step 2-11: Energy questions
    if(step>=2&&step<=11){
      const qi=step-2;
      const q=energyQs[qi];
      return(
        <div style={s.wrap}><div style={s.cnt} className="fade">
          <div style={s.card}>
            <p style={{fontSize:13,color:t.muted,marginBottom:8}}>Question {qi+1} of 10</p>
            <h2 style={s.h2}>How do you feel about...</h2>
            <p style={{fontSize:18,color:t.text,marginBottom:24}}>{q.q}</p>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:24}}>
              {['😫','😕','😐','🙂','😍'].map((em,i)=>(
                <span key={i} style={{fontSize:36,cursor:'pointer',opacity:d.energy[q.id]===i+1?1:0.4,transition:'all .15s'}}
                  onClick={()=>{u({energy:{...d.energy,[q.id]:i+1}});setTimeout(()=>setStep(step+1),200);}}>
                  {em}
                </span>
              ))}
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:t.muted}}>
              <span>Hate it</span><span>Love it</span>
            </div>
          </div>
        </div></div>
      );
    }
    // Step 12: Deal breakers
    if(step===12)return(
      <div style={s.wrap}><div style={s.cnt} className="fade">
        <div style={s.card}>
          <h2 style={s.h2}>Any deal breakers?</h2>
          <p style={s.p}>Select anything you absolutely can't tolerate</p>
          <div style={{display:'flex',flexWrap:'wrap',marginBottom:16}}>
            {dbOpts.map(db=>(
              <span key={db} style={d.dealBreakers.includes(db)?{...s.chip,...s.chipA}:s.chip}
                onClick={()=>u({dealBreakers:d.dealBreakers.includes(db)?d.dealBreakers.filter(x=>x!==db):[...d.dealBreakers,db]})}>
                {db}
              </span>
            ))}
          </div>
          <button style={{...s.btn,...s.btnP}} onClick={()=>setStep(13)}>Continue</button>
        </div>
      </div></div>
    );
    // Step 13: Financial
    if(step===13)return(
      <div style={s.wrap}><div style={s.cnt} className="fade">
        <div style={s.card}>
          <h2 style={s.h2}>Your financial flexibility?</h2>
          <p style={s.p}>This helps us recommend careers that fit your situation</p>
          {[{v:'tight',l:'Tight — need stable income ASAP'},{v:'some',l:'Some flexibility — could take a short pay cut'},{v:'comfortable',l:'Comfortable — can invest in a transition'}].map(o=>(
            <div key={o.v} style={{...s.card,padding:16,marginBottom:8,cursor:'pointer',border:d.fin===o.v?'2px solid '+t.pri:'1px solid '+t.border}}
              onClick={()=>{u({fin:o.v});setStep(14);}}>
              {o.l}
            </div>
          ))}
        </div>
      </div></div>
    );
    // Step 14: Email
    if(step===14)return(
      <div style={s.wrap}><div style={s.cnt} className="fade">
        <div style={s.card}>
          <h2 style={s.h2}>Almost done! Where should we send your results?</h2>
          <input style={s.input} type="email" placeholder="your@email.com" value={d.email} onChange={e=>u({email:e.target.value})}/>
          <button style={{...s.btn,...s.btnP}} disabled={!d.email.includes('@')} onClick={calc}>See My Career Matches</button>
          <button style={{...s.btn,...s.btnS}} onClick={calc}>Skip — just show results</button>
        </div>
      </div></div>
    );
    // Results
    if(step===100)return(
      <div style={s.wrap}><div style={s.cnt}>
        <div style={{...s.card,textAlign:'center',background:t.priL}} className="fade">
          <h1 style={s.h1}>{d.name}, here are your top matches!</h1>
          <p style={s.p}>Based on your skills, energy, and preferences</p>
        </div>
        {d.results.slice(0,5).map((c,i)=>(
          <div key={c.id} style={{...s.card,border:i===0?'2px solid '+t.pri:'1px solid '+t.border}} className="fade">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <span style={{fontSize:12,fontWeight:600,color:t.pri}}>#{i+1} MATCH</span>
              <span style={{fontSize:12,padding:'4px 10px',borderRadius:12,background:catColors[c.c]||'#888',color:'#fff'}}>{c.c}</span>
            </div>
            <div style={{fontSize:24,fontWeight:600,marginBottom:4}}>{c.e} {c.t}</div>
            <p style={{fontSize:15,color:t.sub,marginBottom:16}}>{c.desc}</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
              <div style={{background:t.bg,padding:12,borderRadius:10}}>
                <div style={{fontSize:12,color:t.muted}}>SALARY</div>
                <div style={{fontSize:16,fontWeight:600,color:t.pri}}>${c.s?.[0]}K - ${c.s?.[2]}K+</div>
              </div>
              <div style={{background:t.bg,padding:12,borderRadius:10}}>
                <div style={{fontSize:12,color:t.muted}}>TRANSITION</div>
                <div style={{fontSize:16,fontWeight:600}}>{c.tm}</div>
              </div>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,fontWeight:600,color:t.muted,marginBottom:8}}>REALITY CHECK</div>
              {c.truth?.map((tb,j)=><p key={j} style={{fontSize:14,color:t.sub,marginBottom:4}}>⚠️ {tb}</p>)}
            </div>
            {c.res&&(
              <div>
                <div style={{fontSize:12,fontWeight:600,color:t.muted,marginBottom:8}}>RESOURCES</div>
                {c.res?.slice(0,3).map((r,j)=>{
                  const[name,cost]=r.split('|');
                  return <div key={j} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:j<2?'1px solid '+t.border:'none'}}>
                    <span style={{fontSize:14}}>{name}</span>
                    <span style={{fontSize:14,fontWeight:600,color:t.pri}}>{cost}</span>
                  </div>;
                })}
              </div>
            )}
          </div>
        ))}
        <button style={{...s.btn,...s.btnS}} onClick={()=>setMode('browse')}>Browse All 122 Careers</button>
        <button style={{...s.btn,...s.btnS}} onClick={()=>{setStep(0);u({skills:[],energy:{},dealBreakers:[],results:[]});}}>Retake Quiz</button>
      </div></div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
