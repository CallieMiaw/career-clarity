  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:#FFFBF5;color:#1a1a2e;overflow-x:hidden}
    
    /* Fun gradient background */
    .gradient-bg{
      background:linear-gradient(135deg,#FF6B6B 0%,#FFE66D 25%,#4ECDC4 50%,#A8E6CF 75%,#FFE66D 100%);
      background-size:400% 400%;
      animation:gradientShift 15s ease infinite;
    }
    @keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    
    /* Blob shapes */
    .blob{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.6;pointer-events:none;z-index:0}
    .blob-1{width:400px;height:400px;background:#FF6B6B;top:-100px;left:-100px}
    .blob-2{width:300px;height:300px;background:#4ECDC4;top:200px;right:-50px}
    .blob-3{width:350px;height:350px;background:#FFE66D;bottom:-100px;left:30%}
    
    /* Animations */
    .fade-up{animation:fadeUp .6s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .delay-1{animation-delay:.1s}
    .delay-2{animation-delay:.2s}
    .delay-3{animation-delay:.3s}
    .delay-4{animation-delay:.4s}
    
    .bounce{animation:bounce 2s infinite}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    
    .wiggle:hover{animation:wiggle .5s ease}
    @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}
    
    .pop{transition:all .2s cubic-bezier(.68,-.55,.265,1.55)}
    .pop:hover{transform:scale(1.05)}
    .pop:active{transform:scale(0.95)}
    
    /* Cards */
    .card{
      background:#fff;
      border-radius:24px;
      border:3px solid #1a1a2e;
      box-shadow:6px 6px 0 #1a1a2e;
      transition:all .2s ease;
    }
    .card:hover{box-shadow:8px 8px 0 #1a1a2e;transform:translate(-2px,-2px)}
    
    .card-flat{
      background:#fff;
      border-radius:20px;
      border:2px solid #e8e8e8;
    }
    
    /* Buttons */
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:10px;
      padding:18px 36px;border-radius:100px;font-size:18px;font-weight:700;
      cursor:pointer;transition:all .2s cubic-bezier(.68,-.55,.265,1.55);
      font-family:'DM Sans',sans-serif;border:3px solid #1a1a2e;
    }
    .btn-primary{background:#FFE66D;color:#1a1a2e;box-shadow:4px 4px 0 #1a1a2e}
    .btn-primary:hover{box-shadow:6px 6px 0 #1a1a2e;transform:translate(-2px,-2px)}
    .btn-primary:active{box-shadow:2px 2px 0 #1a1a2e;transform:translate(2px,2px)}
    
    .btn-secondary{background:#fff;color:#1a1a2e;box-shadow:4px 4px 0 #1a1a2e}
    .btn-secondary:hover{background:#f5f5f5;box-shadow:6px 6px 0 #1a1a2e;transform:translate(-2px,-2px)}
    
    .btn-ghost{background:transparent;border:2px solid #1a1a2e;box-shadow:none}
    .btn-ghost:hover{background:#1a1a2e;color:#fff}
    
    /* Pills/Chips */
    .pill{
      display:inline-flex;align-items:center;gap:6px;
      padding:10px 20px;border-radius:100px;font-size:14px;font-weight:600;
      border:2px solid #1a1a2e;cursor:pointer;transition:all .15s ease;
      background:#fff;
    }
    .pill:hover{transform:translateY(-2px)}
    .pill.active{background:#1a1a2e;color:#fff}
    
    /* Progress bar */
    .progress-track{height:12px;background:#e8e8e8;border-radius:100px;overflow:hidden;border:2px solid #1a1a2e}
    .progress-fill{height:100%;background:linear-gradient(90deg,#FF6B6B,#FFE66D,#4ECDC4);border-radius:100px;transition:width .4s cubic-bezier(.16,1,.3,1)}
    
    /* Emoji ratings */
    .emoji-btn{
      font-size:48px;cursor:pointer;transition:all .2s cubic-bezier(.68,-.55,.265,1.55);
      filter:grayscale(100%);opacity:0.5;
    }
    .emoji-btn:hover{transform:scale(1.2);filter:grayscale(0%);opacity:1}
    .emoji-btn.active{transform:scale(1.3);filter:grayscale(0%);opacity:1}
    
    /* Option cards */
    .option{
      padding:20px 24px;border-radius:16px;cursor:pointer;
      border:3px solid #e8e8e8;background:#fff;
      transition:all .15s ease;font-size:16px;
    }
    .option:hover{border-color:#1a1a2e;transform:translateX(4px)}
    .option.active{border-color:#1a1a2e;background:#FFE66D}
    
    /* Typography */
    h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;line-height:1.1}
    
    /* Confetti */
    .confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000}
    .confetti-piece{position:absolute;width:12px;height:12px;animation:confettiFall 3s linear forwards}
    @keyframes confettiFall{
      0%{transform:translateY(-100px) rotate(0deg);opacity:1}
      100%{transform:translateY(100vh) rotate(720deg);opacity:0}
    }
    
    /* Responsive */
    @media(max-width:640px){
      .btn{padding:16px 28px;font-size:16px}
      .emoji-btn{font-size:40px}
      h1{font-size:36px!important}
    }
  </style>
</head>

// Confetti component
const Confetti = () => {
  const colors = ['#FF6B6B','#FFE66D','#4ECDC4','#A8E6CF','#AA96DA'];
  const pieces = Array.from({length:50}).map((_,i) => ({
    id:i,
    left: Math.random() * 100 + '%',
    delay: Math.random() * 2 + 's',
    color: colors[Math.floor(Math.random() * colors.length)],
    size: Math.random() * 8 + 8
  }));
  return (
    <div className="confetti">
      {pieces.map(p => (
        <div key={p.id} className="confetti-piece" style={{
          left:p.left,
          animationDelay:p.delay,
          background:p.color,
          width:p.size,
          height:p.size,
          borderRadius: Math.random() > 0.5 ? '50%' : '2px'
        }}/>
      ))}
    </div>
  );
};

// PDF Generation
const generatePDF = (userData) => {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:'portrait',unit:'pt',format:'letter'});
  const pageWidth = 612, pageHeight = 792, margin = 50;
  const pType = personalityTypes[userData.topType] || personalityTypes.explorer;
  
  // Page 1
  doc.setFillColor(255,251,245);
  doc.rect(0,0,pageWidth,pageHeight,'F');
  
  // Header bar
  doc.setFillColor(26,26,46);
  doc.rect(0,0,pageWidth,100,'F');
  
  doc.setTextColor(255,255,255);
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.text('CAREER CLARITY',margin,45);
  doc.setFontSize(28);
  doc.text(userData.name + "'s Career DNA",margin,75);
  
  // Personality card
  let y = 130;
  doc.setFillColor(255,230,109);
  doc.roundedRect(margin,y,pageWidth-margin*2,120,12,12,'F');
  doc.setFillColor(26,26,46);
  doc.roundedRect(margin+3,y+3,pageWidth-margin*2,120,12,12,'S');
  
  doc.setTextColor(26,26,46);
  doc.setFontSize(36);
  doc.text(pType.emoji + ' ' + pType.name.toUpperCase(),margin+20,y+50);
  doc.setFontSize(12);
  doc.setFont('helvetica','normal');
  const descLines = doc.splitTextToSize(pType.desc,pageWidth-margin*2-40);
  doc.text(descLines,margin+20,y+80);
  
  y += 150;
  
  // Top matches
  doc.setFontSize(16);
  doc.setFont('helvetica','bold');
  doc.text('YOUR TOP CAREER MATCHES',margin,y);
  y += 30;
  
  userData.results.slice(0,3).forEach((c,i) => {
    doc.setFillColor(255,255,255);
    doc.roundedRect(margin,y,pageWidth-margin*2,60,8,8,'F');
    doc.setDrawColor(26,26,46);
    doc.setLineWidth(2);
    doc.roundedRect(margin,y,pageWidth-margin*2,60,8,8,'S');
    
    doc.setFontSize(24);
    doc.setFont('helvetica','bold');
    doc.setTextColor(26,26,46);
    doc.text((i+1)+'.',margin+15,y+35);
    doc.text(c.e + ' ' + c.t,margin+50,y+35);
    
    doc.setFontSize(14);
    doc.setFont('helvetica','bold');
    doc.setTextColor(78,205,196);
    doc.text(c.score + '% match',pageWidth-margin-80,y+35);
    
    y += 75;
  });
  
  // Footer
  doc.setFillColor(26,26,46);
  doc.rect(0,pageHeight-60,pageWidth,60,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(12);
  doc.text('Take the quiz: careerclarity.com',margin,pageHeight-28);
  
  // Page 2
  doc.addPage();
  doc.setFillColor(255,251,245);
  doc.rect(0,0,pageWidth,pageHeight,'F');
  
  doc.setFillColor(26,26,46);
  doc.rect(0,0,pageWidth,70,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(20);
  doc.setFont('helvetica','bold');
  doc.text('Your Detailed Results',margin,45);
  
  y = 100;
  
  const topCareer = userData.results[0];
  if(topCareer) {
    doc.setFontSize(14);
    doc.setFont('helvetica','bold');
    doc.setTextColor(26,26,46);
    doc.text('🎯 YOUR #1 MATCH',margin,y);
    y += 25;
    
    doc.setFillColor(232,245,233);
    doc.roundedRect(margin,y,pageWidth-margin*2,180,10,10,'F');
    
    doc.setFontSize(22);
    doc.text(topCareer.e + ' ' + topCareer.t,margin+20,y+35);
    
    doc.setFontSize(11);
    doc.setFont('helvetica','normal');
    doc.setTextColor(82,82,91);
    doc.text('Salary: $'+(topCareer.s?.[0]||0)+'K - $'+(topCareer.s?.[2]||0)+'K+',margin+20,y+60);
    doc.text('Transition: '+topCareer.tm,margin+20,y+78);
    
    doc.setFont('helvetica','bold');
    doc.setTextColor(26,26,46);
    doc.text('Reality Check:',margin+20,y+105);
    doc.setFont('helvetica','normal');
    doc.setTextColor(82,82,91);
    (topCareer.truth||[]).slice(0,3).forEach((t,i) => {
      doc.text('• '+t,margin+20,y+122+i*16);
    });
    
    y += 200;
  }
  
  // Other matches
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.setTextColor(26,26,46);
  doc.text('OTHER STRONG MATCHES',margin,y);
  y += 25;
  
  userData.results.slice(1,5).forEach((c,i) => {
    doc.setFontSize(12);
    doc.setFont('helvetica','bold');
    doc.text('#'+(i+2)+' '+c.e+' '+c.t,margin,y);
    doc.setFont('helvetica','normal');
    doc.setTextColor(82,82,91);
    doc.text(c.score+'% • $'+(c.s?.[0]||0)+'K-$'+(c.s?.[2]||0)+'K+ • '+c.tm,margin+220,y);
    doc.setTextColor(26,26,46);
    y += 22;
  });
  
  y += 20;
  
  // Action
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.text('📌 YOUR NEXT STEP',margin,y);
  y += 20;
  
  doc.setFillColor(255,230,109);
  doc.roundedRect(margin,y,pageWidth-margin*2,70,8,8,'F');
  doc.setFontSize(11);
  doc.setFont('helvetica','normal');
  doc.setTextColor(26,26,46);
  const actionText = 'Find 3 people on LinkedIn with the title "'+topCareer?.t+'". Send them a message asking for 15 minutes to learn how they got there.';
  const actionLines = doc.splitTextToSize(actionText,pageWidth-margin*2-40);
  doc.text(actionLines,margin+20,y+28);
  
  doc.save(userData.name.replace(/\s+/g,'_')+'_Career_DNA.pdf');
};

  const[mode,setMode]=useState('home');
  const[step,setStep]=useState(0);
  const[showConfetti,setShowConfetti]=useState(false);
  const[filter,setFilter]=useState({cat:'',search:''});
  const[d,setD]=useState({
    name:'',email:'',currentRole:'',experience:'',education:'',
    satisfaction:null,timeframe:'',financialFlex:'',riskTolerance:'',location:'',
    energy:{},workStyle:{},values:{},dealBreakers:[],fear:'',
    results:[],topType:''
  });
  const u=x=>setD(p=>({...p,...x}));
  
  const totalSteps=33;
  const progress=Math.min(100,(step/totalSteps)*100);
  const categories=useMemo(()=>[...new Set(Object.values(C).map(c=>c.c))].sort(),[]);
  const filtered=useMemo(()=>Object.entries(C).filter(([id,c])=>{
    if(filter.cat&&c.c!==filter.cat)return false;
    if(filter.search&&!c.t.toLowerCase().includes(filter.search.toLowerCase()))return false;
    return true;
  }).map(([id,c])=>({id,...c})),[filter]);
  
  const pType=personalityTypes[d.topType]||personalityTypes.explorer;

  // Calculate results
  const calculateResults=()=>{
    const scores={};
    const typeScores={builder:0,analyst:0,helper:0,communicator:0,optimizer:0,creative:0,explorer:0,specialist:0};
    
    Object.entries(d.energy).forEach(([qId,rating])=>{
      const q=energyQuestions.find(x=>x.id===qId);
      if(q?.tags){
        const mult=(rating-3)/2;
        Object.entries(q.tags).forEach(([tag,weight])=>{
          if(typeScores.hasOwnProperty(tag))typeScores[tag]+=mult*weight;
        });
      }
    });
    
    Object.entries(d.workStyle).forEach(([qId,val])=>{
      const q=workStyleQuestions.find(x=>x.id===qId);
      const opt=q?.opts.find(o=>o.v===val);
      if(opt?.tags){
        Object.entries(opt.tags).forEach(([tag,weight])=>{
          if(typeScores.hasOwnProperty(tag))typeScores[tag]+=weight;
        });
      }
    });
    
    const sortedTypes=Object.entries(typeScores).sort((a,b)=>b[1]-a[1]);
    const topType=sortedTypes[0]?.[0]||'explorer';
    const topTypes=sortedTypes.slice(0,3).map(([t])=>t);
    
    Object.entries(C).forEach(([id,c])=>{
      let score=50;
      if(c.traits){
        c.traits.forEach(trait=>{
          const tl=trait.toLowerCase();
          topTypes.forEach((type,i)=>{
            if(tl.includes(type.slice(0,4))||type.includes(tl.slice(0,4)))score+=(5-i)*3;
          });
        });
      }
      if(c.vals){
        c.vals.forEach(val=>{
          Object.entries(d.values).forEach(([qId,choice])=>{
            const q=valueQuestions.find(x=>x.id===qId);
            const chosenTag=choice==='a'?q.tagA:q.tagB;
            if(val.includes(chosenTag)||chosenTag.includes(val))score+=8;
          });
        });
      }
      
      const finFlex=financialFlex.findIndex(f=>f.v===d.financialFlex)+1||2;
      if(finFlex===1){if(c.d===3)score-=25;if(c.s?.[0]===0)score-=30;}
      
      const urgency=timeframes.find(tf=>tf.v===d.timeframe)?.urgency||3;
      if(urgency>=4&&c.d===3)score-=20;
      if(urgency>=4&&c.d===1)score+=10;
      
      if(d.location==='remote'){
        if(['Very common','Yes','Often','Common'].includes(c.life?.r))score+=10;
        else if(['No','Rarely'].includes(c.life?.r))score-=15;
      }
      
      d.dealBreakers.forEach(dbId=>{
        const db=dealBreakers.find(x=>x.id===dbId);
        if(!db)return;
        if(db.tag==='meetings'&&c.truth?.some(t=>t.toLowerCase().includes('meeting')))score-=25;
        if(db.tag==='unstable'&&(c.s?.[0]===0||c.truth?.some(t=>t.toLowerCase().includes('famine'))))score-=30;
        if(db.tag==='sales'&&c.t.includes('Sales'))score-=25;
        if(db.tag==='longhours'&&c.truth?.some(t=>t.includes('60')||t.includes('80')))score-=25;
        if(db.tag==='degree'&&c.d===3)score-=25;
        if(db.tag==='physical'&&(c.c==='Trades'||c.c==='Outdoors'))score-=25;
      });
      
      if(c.d===1)score+=8;
      if(c.d===3)score-=5;
      
      scores[id]=Math.max(0,Math.min(100,Math.round(score)));
    });
    
    const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,20).map(([id,score])=>({id,...C[id],score}));
    u({results:sorted,topType});
    setShowConfetti(true);
    setTimeout(()=>setShowConfetti(false),3000);
    
    fetch('https://script.google.com/macros/s/AKfycbxi-vcsL2izUXE-UCNb98PFbAZHWv4QFCN-WYJic-o7Qg8W04VDgOb-nrQbUJUzfxWD/exec',{
      method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:d.name,email:d.email,website:'',topCareer1:sorted[0]?.t||'',topCareer2:sorted[1]?.t||'',topCareer3:sorted[2]?.t||'',topType})
    }).catch(e=>console.log(e));
    
    setStep(100);
  };

  // ======== RENDER ========

  // HOME
  if(mode==='home')return(
    <div style={{minHeight:'100vh',position:'relative',overflow:'hidden'}}>
      <div className="blob blob-1"></div>
      <div className="blob blob-2"></div>
      <div className="blob blob-3"></div>
      
      {/* Header */}
      <nav style={{padding:'20px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'relative',zIndex:10}}>
        <div style={{fontFamily:"'Bricolage Grotesque'",fontSize:24,fontWeight:800}}>🧭 Career Clarity</div>
        <button className="btn btn-ghost" style={{padding:'10px 20px',fontSize:14}} onClick={()=>setMode('browse')}>
          Browse Careers
        </button>
      </nav>
      
      {/* Hero */}
      <div style={{maxWidth:900,margin:'0 auto',padding:'60px 24px',textAlign:'center',position:'relative',zIndex:10}}>
        <div className="fade-up">
          <div style={{fontSize:80,marginBottom:20}} className="bounce">🧭</div>
          <h1 style={{fontSize:56,fontWeight:800,marginBottom:20,lineHeight:1}}>
            Find work you'll<br/><span style={{background:'linear-gradient(90deg,#FF6B6B,#FFE66D)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>actually love</span>
          </h1>
          <p style={{fontSize:20,color:'#52525B',maxWidth:500,margin:'0 auto 40px',lineHeight:1.6}}>
            5-minute quiz. 122 real careers. Personalized matches based on who you actually are.
          </p>
          
          <button className="btn btn-primary pop" style={{fontSize:20,padding:'22px 48px'}} onClick={()=>setMode('quiz')}>
            Find My Path →
          </button>
          
          <p style={{marginTop:20,fontSize:14,color:'#A1A1AA'}}>
            Free • No signup required • Get a PDF of your results
          </p>
        </div>
        
        {/* Feature cards */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:20,marginTop:80}}>
          {[
            {emoji:'🎯',title:'122 Real Careers',desc:'From Product Manager to Death Doula. Careers people actually do.'},
            {emoji:'🔮',title:'Personality Match',desc:'Based on what energizes you, your values, and work style.'},
            {emoji:'⚡',title:'Honest Truth Bombs',desc:'What nobody tells you before you commit.'},
          ].map((f,i)=>(
            <div key={i} className={"card fade-up delay-"+(i+1)} style={{padding:28,textAlign:'left'}}>
              <div style={{fontSize:40,marginBottom:12}}>{f.emoji}</div>
              <h3 style={{fontSize:20,fontWeight:700,marginBottom:8}}>{f.title}</h3>
              <p style={{fontSize:15,color:'#52525B',lineHeight:1.5}}>{f.desc}</p>
            </div>
          ))}
        </div>
        
        {/* Personality types preview */}
        <div style={{marginTop:80}}>
          <h2 style={{fontSize:28,fontWeight:700,marginBottom:24}}>Discover your Career DNA</h2>
          <div style={{display:'flex',flexWrap:'wrap',justifyContent:'center',gap:12}}>
            {Object.values(personalityTypes).map((p,i)=>(
              <div key={i} className="pill wiggle" style={{background:p.bg,borderColor:p.color}}>
                <span style={{fontSize:20}}>{p.emoji}</span>
                {p.name}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  // BROWSE
  if(mode==='browse')return(
    <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
      <div style={{maxWidth:1100,margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24,flexWrap:'wrap',gap:16}}>
          <h1 style={{fontSize:32,fontWeight:800}}>Browse All 122 Careers</h1>
          <button className="btn btn-ghost" onClick={()=>setMode('home')}>← Back</button>
        </div>
        
        <div className="card" style={{padding:20,marginBottom:24}}>
          <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
            <input 
              placeholder="🔍 Search careers..." 
              value={filter.search}
              onChange={e=>setFilter(p=>({...p,search:e.target.value}))}
              style={{flex:1,minWidth:200,padding:'14px 20px',borderRadius:100,border:'2px solid #e8e8e8',fontSize:16,fontFamily:'DM Sans'}}
            />
            <select 
              value={filter.cat}
              onChange={e=>setFilter(p=>({...p,cat:e.target.value}))}
              style={{padding:'14px 20px',borderRadius:100,border:'2px solid #e8e8e8',fontSize:16,fontFamily:'DM Sans',background:'#fff',cursor:'pointer'}}
            >
              <option value="">All Categories</option>
              {categories.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>
        
        <p style={{marginBottom:16,color:'#52525B'}}>{filtered.length} careers found</p>
        
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:20}}>
          {filtered.map(c=>(
            <div key={c.id} className="card pop" style={{padding:24}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <span style={{padding:'6px 14px',borderRadius:100,fontSize:12,fontWeight:600,background:catColors[c.c]||'#ddd',color:'#fff'}}>{c.c}</span>
                <span style={{fontSize:13,color:'#A1A1AA'}}>{c.d===1?'🟢 Easy':c.d===2?'🟡 Medium':'🔴 Hard'}</span>
              </div>
              <div style={{fontSize:32,marginBottom:8}}>{c.e}</div>
              <h3 style={{fontSize:20,fontWeight:700,marginBottom:8}}>{c.t}</h3>
              <p style={{fontSize:14,color:'#52525B',marginBottom:16,lineHeight:1.5}}>{c.desc}</p>
              <div style={{fontSize:16,fontWeight:700,color:'#4ECDC4'}}>${c.s?.[0]}K – ${c.s?.[2]}K+</div>
              <div style={{fontSize:13,color:'#A1A1AA',marginTop:4}}>{c.tm} transition</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  // QUIZ
  if(mode==='quiz'){
    const ProgressBar=()=>(
      <div className="progress-track" style={{marginBottom:24}}>
        <div className="progress-fill" style={{width:progress+'%'}}></div>
      </div>
    );
    const BackBtn=({onClick})=>(
      <button className="btn btn-ghost" style={{padding:'10px 20px',fontSize:14,marginBottom:20}} onClick={onClick||(()=>setStep(Math.max(0,step-1)))}>← Back</button>
    );

    // Step 0: Name
    if(step===0)return(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
        <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
          <button className="btn btn-ghost" style={{padding:'10px 20px',fontSize:14,marginBottom:20}} onClick={()=>setMode('home')}>← Back</button>
          <div className="card" style={{padding:32,textAlign:'center'}}>
            <div style={{fontSize:64,marginBottom:16}}>👋</div>
            <h1 style={{fontSize:32,fontWeight:800,marginBottom:12}}>Let's find your path!</h1>
            <p style={{fontSize:16,color:'#52525B',marginBottom:24}}>This takes about 5 minutes. Be honest — there are no wrong answers!</p>
            <input
              placeholder="What's your first name?"
              value={d.name}
              onChange={e=>u({name:e.target.value})}
              onKeyDown={e=>e.key==='Enter'&&d.name&&setStep(1)}
              autoFocus
              style={{width:'100%',padding:'18px 24px',borderRadius:16,border:'3px solid #e8e8e8',fontSize:18,fontFamily:'DM Sans',textAlign:'center',marginBottom:20}}
            />
            <button className="btn btn-primary" style={{width:'100%'}} disabled={!d.name.trim()} onClick={()=>setStep(1)}>
              Let's go! 🚀
            </button>
          </div>
        </div>
      </div>
    );

    // Generic option step renderer
    const OptionStep=({title,options,value,onChange,emoji})=>(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
        <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
          <BackBtn/>
          <ProgressBar/>
          <div className="card" style={{padding:32}}>
            {emoji&&<div style={{fontSize:48,marginBottom:16}}>{emoji}</div>}
            <h2 style={{fontSize:26,fontWeight:700,marginBottom:24}}>{title}</h2>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {options.map(opt=>(
                <div key={opt.v||opt.l} className={"option"+(value===(opt.v??opt.l)?' active':'')} onClick={()=>{onChange(opt.v??opt.l);setTimeout(()=>setStep(step+1),200);}}>
                  {opt.l}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    );

    // Steps 1-8: Context questions
    if(step===1)return<OptionStep title={"What do you currently do, "+d.name+"?"} options={currentRoles} value={d.currentRole} onChange={v=>u({currentRole:v})} emoji="💼"/>;
    if(step===2)return<OptionStep title="How long have you been working?" options={experienceLevels} value={d.experience} onChange={v=>u({experience:v})} emoji="📅"/>;
    if(step===3)return<OptionStep title="Highest education?" options={educationLevels} value={d.education} onChange={v=>u({education:v})} emoji="🎓"/>;
    if(step===4)return<OptionStep title="How do you feel about your current situation?" options={satisfactionLevels} value={d.satisfaction} onChange={v=>u({satisfaction:v})} emoji="🤔"/>;
    if(step===5)return<OptionStep title="When do you want to make a change?" options={timeframes} value={d.timeframe} onChange={v=>u({timeframe:v})} emoji="⏰"/>;
    if(step===6)return<OptionStep title="What's your financial flexibility?" options={financialFlex} value={d.financialFlex} onChange={v=>u({financialFlex:v})} emoji="💰"/>;
    if(step===7)return<OptionStep title="What's your risk tolerance?" options={riskTolerance} value={d.riskTolerance} onChange={v=>u({riskTolerance:v})} emoji="🎲"/>;
    if(step===8)return<OptionStep title="Where do you want to work?" options={locationPrefs} value={d.location} onChange={v=>u({location:v})} emoji="📍"/>;

    // Steps 9-20: Energy questions
    if(step>=9&&step<=20){
      const qi=step-9;
      const q=energyQuestions[qi];
      return(
        <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
          <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
            <BackBtn/>
            <ProgressBar/>
            <div className="card" style={{padding:32,textAlign:'center'}}>
              <p style={{fontSize:14,color:'#A1A1AA',marginBottom:8}}>Energy Check {qi+1}/12</p>
              <h2 style={{fontSize:24,fontWeight:700,marginBottom:8}}>How do you feel about...</h2>
              <p style={{fontSize:20,color:'#1a1a2e',marginBottom:32,fontWeight:500}}>"{q.q}"</p>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}>
                {['😫','😕','😐','🙂','😍'].map((em,i)=>(
                  <span key={i} className={"emoji-btn"+(d.energy[q.id]===i+1?' active':'')} 
                    onClick={()=>{u({energy:{...d.energy,[q.id]:i+1}});setTimeout(()=>setStep(step+1),300);}}>
                    {em}
                  </span>
                ))}
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,color:'#A1A1AA'}}>
                <span>Drains me</span><span>Energizes me</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Steps 21-24: Work style
    if(step>=21&&step<=24){
      const qi=step-21;
      const q=workStyleQuestions[qi];
      return(
        <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
          <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
            <BackBtn/>
            <ProgressBar/>
            <div className="card" style={{padding:32}}>
              <p style={{fontSize:14,color:'#A1A1AA',marginBottom:8}}>Work Style {qi+1}/4</p>
              <h2 style={{fontSize:24,fontWeight:700,marginBottom:24}}>{q.q}</h2>
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                {q.opts.map(opt=>(
                  <div key={opt.v} className={"option"+(d.workStyle[q.id]===opt.v?' active':'')}
                    onClick={()=>{u({workStyle:{...d.workStyle,[q.id]:opt.v}});setTimeout(()=>setStep(step+1),200);}}>
                    {opt.l}
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Steps 25-30: Values
    if(step>=25&&step<=30){
      const qi=step-25;
      const q=valueQuestions[qi];
      return(
        <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
          <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
            <BackBtn/>
            <ProgressBar/>
            <div className="card" style={{padding:32,textAlign:'center'}}>
              <p style={{fontSize:14,color:'#A1A1AA',marginBottom:8}}>Values {qi+1}/6</p>
              <h2 style={{fontSize:24,fontWeight:700,marginBottom:32}}>{q.q}</h2>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                <div className={"card pop"+(d.values[q.id]==='a'?' gradient-bg':'')} 
                  style={{padding:24,cursor:'pointer',textAlign:'center'}}
                  onClick={()=>{u({values:{...d.values,[q.id]:'a'}});setTimeout(()=>setStep(step+1),200);}}>
                  <div style={{fontSize:32,marginBottom:8}}>{q.a.split(' ')[0]}</div>
                  <div style={{fontSize:14,fontWeight:600}}>{q.a.slice(2)}</div>
                </div>
                <div className={"card pop"+(d.values[q.id]==='b'?' gradient-bg':'')}
                  style={{padding:24,cursor:'pointer',textAlign:'center'}}
                  onClick={()=>{u({values:{...d.values,[q.id]:'b'}});setTimeout(()=>setStep(step+1),200);}}>
                  <div style={{fontSize:32,marginBottom:8}}>{q.b.split(' ')[0]}</div>
                  <div style={{fontSize:14,fontWeight:600}}>{q.b.slice(2)}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Step 31: Deal breakers
    if(step===31)return(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
        <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
          <BackBtn/>
          <ProgressBar/>
          <div className="card" style={{padding:32}}>
            <div style={{fontSize:48,marginBottom:16}}>🚫</div>
            <h2 style={{fontSize:24,fontWeight:700,marginBottom:8}}>Any deal breakers?</h2>
            <p style={{fontSize:15,color:'#52525B',marginBottom:24}}>Select anything you absolutely can't tolerate.</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:10,marginBottom:24}}>
              {dealBreakers.map(db=>(
                <span key={db.id} className={"pill"+(d.dealBreakers.includes(db.id)?' active':'')}
                  onClick={()=>u({dealBreakers:d.dealBreakers.includes(db.id)?d.dealBreakers.filter(x=>x!==db.id):[...d.dealBreakers,db.id]})}>
                  {db.l}
                </span>
              ))}
            </div>
            <button className="btn btn-primary" style={{width:'100%'}} onClick={()=>setStep(32)}>Continue</button>
          </div>
        </div>
      </div>
    );

    // Step 32: Fear
    if(step===32)return<OptionStep title="What's your biggest fear about changing careers?" options={[
      {v:'wrong-choice',l:'😰 Making the wrong choice'},
      {v:'not-qualified',l:'🤔 Not being qualified'},
      {v:'money',l:'💸 Taking a financial hit'},
      {v:'starting-over',l:'🔄 Starting over'},
      {v:'age',l:'⏳ Being too old'},
      {v:'judgment',l:'👀 What others think'},
      {v:'none',l:'💪 I\'m not afraid!'}
    ]} value={d.fear} onChange={v=>u({fear:v})} emoji="😨"/>;

    // Step 33: Email
    if(step===33)return(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
        <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
          <BackBtn/>
          <ProgressBar/>
          <div className="card" style={{padding:32,textAlign:'center'}}>
            <div style={{fontSize:64,marginBottom:16}}>🎉</div>
            <h2 style={{fontSize:28,fontWeight:700,marginBottom:12}}>Almost done!</h2>
            <p style={{fontSize:15,color:'#52525B',marginBottom:24}}>Where should we send your Career DNA report?</p>
            <input
              type="email"
              placeholder="your@email.com"
              value={d.email}
              onChange={e=>u({email:e.target.value})}
              style={{width:'100%',padding:'18px 24px',borderRadius:16,border:'3px solid #e8e8e8',fontSize:18,fontFamily:'DM Sans',textAlign:'center',marginBottom:16}}
            />
            <button className="btn btn-primary" style={{width:'100%',marginBottom:12}} onClick={calculateResults}>
              See My Results! 🚀
            </button>
            <button className="btn btn-ghost" style={{width:'100%'}} onClick={calculateResults}>
              Skip — just show me
            </button>
          </div>
        </div>
      </div>
    );

    // RESULTS
    if(step===100)return(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24,position:'relative'}}>
        {showConfetti&&<Confetti/>}
        <div style={{maxWidth:600,margin:'0 auto'}}>
          
          {/* Hero */}
          <div className="card fade-up" style={{padding:40,textAlign:'center',background:'linear-gradient(135deg,#FFE66D 0%,#FF6B6B 100%)',marginBottom:24}}>
            <p style={{fontSize:16,marginBottom:8}}>Hey {d.name}! 👋</p>
            <h1 style={{fontSize:36,fontWeight:800,marginBottom:8}}>Your Career DNA</h1>
            <p style={{fontSize:16,opacity:0.9}}>Here's what we discovered about you</p>
          </div>
          
          {/* Personality Type */}
          <div className="card fade-up delay-1" style={{padding:32,textAlign:'center',background:pType.bg,marginBottom:24}}>
            <div style={{fontSize:72,marginBottom:16}}>{pType.emoji}</div>
            <h2 style={{fontSize:32,fontWeight:800,color:pType.color,marginBottom:12}}>{pType.name}</h2>
            <p style={{fontSize:16,color:'#52525B',marginBottom:20,lineHeight:1.6}}>{pType.desc}</p>
            <div style={{display:'flex',flexWrap:'wrap',justifyContent:'center',gap:8}}>
              {pType.strengths.map((s,i)=>(
                <span key={i} style={{background:'#fff',padding:'8px 16px',borderRadius:100,fontSize:14,fontWeight:600,border:'2px solid '+pType.color}}>
                  {s}
                </span>
              ))}
            </div>
          </div>
          
          {/* Download PDF */}
          <button className="btn btn-primary pop fade-up delay-2" style={{width:'100%',marginBottom:24,fontSize:20}} onClick={()=>generatePDF(d)}>
            📥 Download Your Career DNA (PDF)
          </button>
          
          {/* Fear response */}
          {d.fear&&d.fear!=='none'&&(
            <div className="card fade-up delay-2" style={{padding:24,background:'#FFF8E1',marginBottom:24}}>
              <div style={{fontSize:14,fontWeight:700,color:'#F9B208',marginBottom:8}}>💭 ABOUT YOUR FEAR</div>
              <p style={{fontSize:15,lineHeight:1.6,margin:0}}>{fearMessages[d.fear]}</p>
            </div>
          )}
          
          {/* Career matches */}
          <h2 style={{fontSize:24,fontWeight:700,marginBottom:16}}>Your Top Matches</h2>
          
          {d.results.slice(0,5).map((c,i)=>(
            <div key={c.id} className={"card fade-up delay-"+(i+2)} style={{padding:24,marginBottom:16,border:i===0?'3px solid #4ECDC4':'3px solid #1a1a2e'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <span style={{width:32,height:32,borderRadius:'50%',background:'#1a1a2e',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{i+1}</span>
                  <span style={{padding:'4px 12px',borderRadius:100,fontSize:12,fontWeight:600,background:catColors[c.c]||'#ddd',color:'#fff'}}>{c.c}</span>
                </div>
                <span style={{fontSize:18,fontWeight:700,color:'#4ECDC4'}}>{c.score}%</span>
              </div>
              
              <div style={{fontSize:36,marginBottom:8}}>{c.e}</div>
              <h3 style={{fontSize:22,fontWeight:700,marginBottom:8}}>{c.t}</h3>
              <p style={{fontSize:15,color:'#52525B',marginBottom:16}}>{c.desc}</p>
              
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
                <div style={{background:'#f5f5f5',padding:12,borderRadius:12}}>
                  <div style={{fontSize:12,color:'#A1A1AA'}}>SALARY</div>
                  <div style={{fontSize:18,fontWeight:700,color:'#4ECDC4'}}>${c.s?.[0]}K – ${c.s?.[2]}K+</div>
                </div>
                <div style={{background:'#f5f5f5',padding:12,borderRadius:12}}>
                  <div style={{fontSize:12,color:'#A1A1AA'}}>TRANSITION</div>
                  <div style={{fontSize:18,fontWeight:700}}>{c.tm}</div>
                </div>
              </div>
              
              <div style={{fontSize:12,fontWeight:700,color:'#A1A1AA',marginBottom:8}}>⚠️ REALITY CHECK</div>
              {c.truth?.map((t,j)=>(
                <p key={j} style={{fontSize:14,color:'#52525B',marginBottom:4,paddingLeft:12,borderLeft:'3px solid #FFE66D'}}>
                  {t}
                </p>
              ))}
            </div>
          ))}
          
          {/* Action */}
          <div className="card fade-up" style={{padding:24,background:'#E8F5E9',marginBottom:24}}>
            <h3 style={{fontSize:18,fontWeight:700,marginBottom:12}}>📌 Your Next Step</h3>
            <p style={{fontSize:15,lineHeight:1.6,margin:0}}>
              Find 3 people on LinkedIn with the title "<strong>{d.results[0]?.t}</strong>". Ask them for 15 minutes to learn how they got there.
            </p>
          </div>
          
          <button className="btn btn-secondary" style={{width:'100%',marginBottom:12}} onClick={()=>setMode('browse')}>
            Browse All 122 Careers
          </button>
          <button className="btn btn-ghost" style={{width:'100%'}} onClick={()=>{setStep(0);setD({name:'',email:'',currentRole:'',experience:'',education:'',satisfaction:null,timeframe:'',financialFlex:'',riskTolerance:'',location:'',energy:{},workStyle:{},values:{},dealBreakers:[],fear:'',results:[],topType:''});}}>
            Retake Quiz
          </button>
          
          <p style={{textAlign:'center',fontSize:14,color:'#A1A1AA',marginTop:24}}>
            Found this helpful? Share it with a friend who's stuck! 💛
          </p>
        </div>
      </div>
    );
  }
  
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
