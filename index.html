const Confetti=()=>{
  const colors=['#FF6B6B','#FFE66D','#4ECDC4','#A8E6CF','#AA96DA'];
  const pieces=Array.from({length:50}).map((_,i)=>({id:i,left:Math.random()*100+'%',delay:Math.random()*2+'s',color:colors[Math.floor(Math.random()*colors.length)],size:Math.random()*8+8}));
  return(<div className="confetti">{pieces.map(p=>(<div key={p.id} className="confetti-piece" style={{left:p.left,animationDelay:p.delay,background:p.color,width:p.size,height:p.size,borderRadius:Math.random()>.5?'50%':'2px'}}/>))}</div>);
};

    <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:24}}>

        <input

          placeholder="your@email.com"

      </div>
    </div>
  );

const generatePDF=(userData)=>{
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'pt',format:'letter'});
  const pageWidth=612,pageHeight=792,margin=50;
  const pType=personalityTypes[userData.topType]||personalityTypes.explorer;
  
  // Helper to strip emojis for PDF (jsPDF can't render them)
  const stripEmoji=(str)=>str.replace(/[\u{1F600}-\u{1F6FF}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}]/gu,'').trim();
  
  // PAGE 1 - Summary
  doc.setFillColor(255,251,245);
  doc.rect(0,0,pageWidth,pageHeight,'F');
  
  // Header
  doc.setFillColor(26,26,46);
  doc.rect(0,0,pageWidth,100,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.text('CAREER CLARITY',margin,45);
  doc.setFontSize(28);
  doc.text(userData.name+"'s Career DNA",margin,75);
  
  // Personality type card
  let y=130;
  doc.setFillColor(255,230,109);
  doc.roundedRect(margin,y,pageWidth-margin*2,100,12,12,'F');
  doc.setDrawColor(26,26,46);
  doc.setLineWidth(2);
  doc.roundedRect(margin,y,pageWidth-margin*2,100,12,12,'S');
  
  doc.setTextColor(26,26,46);
  doc.setFontSize(28);
  doc.setFont('helvetica','bold');
  doc.text(stripEmoji(pType.name).toUpperCase(),margin+20,y+40);
  
  doc.setFontSize(11);
  doc.setFont('helvetica','normal');
  const descLines=doc.splitTextToSize(pType.desc,pageWidth-margin*2-40);
  doc.text(descLines.slice(0,2),margin+20,y+60);
  
  // Strengths
  y+=120;
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.text('YOUR STRENGTHS',margin,y);
  y+=20;
  doc.setFontSize(11);
  doc.setFont('helvetica','normal');
  pType.strengths.forEach((s,i)=>{
    doc.text('•  '+s,margin+10,y+i*18);
  });
  
  // Top matches
  y+=80;
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.text('YOUR TOP CAREER MATCHES',margin,y);
  y+=25;
  
  userData.results.slice(0,3).forEach((c,i)=>{
    doc.setFillColor(255,255,255);
    doc.roundedRect(margin,y,pageWidth-margin*2,50,8,8,'F');
    doc.setDrawColor(26,26,46);
    doc.setLineWidth(1.5);
    doc.roundedRect(margin,y,pageWidth-margin*2,50,8,8,'S');
    
    doc.setFontSize(18);
    doc.setFont('helvetica','bold');
    doc.setTextColor(26,26,46);
    doc.text('#'+(i+1),margin+15,y+30);
    doc.text(stripEmoji(c.t),margin+50,y+30);
    
    doc.setFontSize(14);
    doc.setFont('helvetica','bold');
    doc.setTextColor(78,205,196);
    doc.text(c.score+'% match',pageWidth-margin-90,y+30);
    y+=60;
  });
  
  // Footer
  doc.setFillColor(26,26,46);
  doc.rect(0,pageHeight-50,pageWidth,50,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(11);
  doc.setFont('helvetica','normal');
  doc.text('careerclarity.com',margin,pageHeight-22);
  doc.text('Share with a friend who needs clarity',pageWidth-margin-180,pageHeight-22);
  
  // PAGE 2 - Details
  doc.addPage();
  doc.setFillColor(255,251,245);
  doc.rect(0,0,pageWidth,pageHeight,'F');
  
  // Header
  doc.setFillColor(26,26,46);
  doc.rect(0,0,pageWidth,70,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(20);
  doc.setFont('helvetica','bold');
  doc.text('Your Detailed Results',margin,45);
  
  y=100;
  const topCareer=userData.results[0];
  
  if(topCareer){
    // #1 Match detail
    doc.setFontSize(14);
    doc.setFont('helvetica','bold');
    doc.setTextColor(26,26,46);
    doc.text('YOUR #1 MATCH: '+stripEmoji(topCareer.t).toUpperCase(),margin,y);
    y+=25;
    
    doc.setFillColor(232,245,233);
    doc.roundedRect(margin,y,pageWidth-margin*2,140,10,10,'F');
    
    doc.setFontSize(11);
    doc.setFont('helvetica','normal');
    doc.setTextColor(52,52,52);
    doc.text(topCareer.desc,margin+15,y+25);
    
    doc.setFont('helvetica','bold');
    doc.text('Salary Range:',margin+15,y+50);
    doc.setFont('helvetica','normal');
    doc.text('$'+(topCareer.s?.[0]||0)+'K - $'+(topCareer.s?.[2]||0)+'K+',margin+100,y+50);
    
    doc.setFont('helvetica','bold');
    doc.text('Transition Time:',margin+15,y+68);
    doc.setFont('helvetica','normal');
    doc.text(topCareer.tm,margin+115,y+68);
    
    doc.setFont('helvetica','bold');
    doc.text('What to know:',margin+15,y+90);
    doc.setFont('helvetica','normal');
    (topCareer.truth||[]).slice(0,3).forEach((t,i)=>{
      const lines=doc.splitTextToSize('• '+t,pageWidth-margin*2-40);
      doc.text(lines[0],margin+15,y+106+i*14);
    });
    
    y+=160;
  }
  
  // Other matches
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.setTextColor(26,26,46);
  doc.text('OTHER MATCHES TO EXPLORE',margin,y);
  y+=22;
  
  userData.results.slice(1,6).forEach((c,i)=>{
    doc.setFontSize(11);
    doc.setFont('helvetica','bold');
    doc.setTextColor(26,26,46);
    doc.text('#'+(i+2)+' '+stripEmoji(c.t),margin,y);
    
    doc.setFont('helvetica','normal');
    doc.setTextColor(100,100,100);
    doc.text(c.score+'%  |  $'+(c.s?.[0]||0)+'K-$'+(c.s?.[2]||0)+'K+  |  '+c.tm,margin+180,y);
    y+=20;
  });
  
  // Next step
  y+=25;
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.setTextColor(26,26,46);
  doc.text('YOUR NEXT STEP',margin,y);
  y+=20;
  
  doc.setFillColor(255,230,109);
  doc.roundedRect(margin,y,pageWidth-margin*2,70,8,8,'F');
  
  doc.setFontSize(11);
  doc.setFont('helvetica','normal');
  doc.setTextColor(26,26,46);
  const nextStepText='Find 3 people on LinkedIn with the title "'+stripEmoji(topCareer?.t)+'". Send them a short message asking for 15 minutes to learn about their path. Most people are happy to help.';
  const nextStepLines=doc.splitTextToSize(nextStepText,pageWidth-margin*2-30);
  doc.text(nextStepLines,margin+15,y+25);
  
  // Save
  doc.save(userData.name.replace(/\s+/g,'_')+'_Career_DNA.pdf');
};

function App(){
  // Try to load saved results from localStorage on mount
  const getSavedData=()=>{
    try{
      const saved=localStorage.getItem('careerClarity_results');
      if(saved){
        const parsed=JSON.parse(saved);
        if(parsed.results&&parsed.results.length>0)return parsed;
      }
    }catch(e){}
    return null;
  };
  
  const savedData=getSavedData();
  const[mode,setMode]=useState(savedData?'quiz':'home');
  const[step,setStep]=useState(savedData?100:0);
  const[showConfetti,setShowConfetti]=useState(false);
  const[showSaveModal,setShowSaveModal]=useState(false);
  const[filter,setFilter]=useState({cat:'',search:''});
  const[d,setD]=useState(savedData||{name:'',email:'',currentRole:'',experience:'',education:'',satisfaction:null,timeframe:'',financialFlex:'',riskTolerance:'',location:'',energy:{},workStyle:{},values:{},dealBreakers:[],fear:'',results:[],topType:''});
  const u=x=>setD(p=>({...p,...x}));
  
  // Show save modal after 45 seconds on results page
  React.useEffect(()=>{
    if(step===100&&!d.email&&!showSaveModal){
      const timer=setTimeout(()=>setShowSaveModal(true),45000);
      return()=>clearTimeout(timer);
    }
  },[step,d.email,showSaveModal]);
  
  const totalSteps=33;
  const progress=Math.min(100,(step/totalSteps)*100);
  const categories=useMemo(()=>[...new Set(Object.values(C).map(c=>c.c))].sort(),[]);
  const filtered=useMemo(()=>Object.entries(C).filter(([id,c])=>{
    if(filter.cat&&c.c!==filter.cat)return false;
    if(filter.search&&!c.t.toLowerCase().includes(filter.search.toLowerCase())&&!c.desc.toLowerCase().includes(filter.search.toLowerCase()))return false;
    return true;
  }).map(([id,c])=>({id,...c})),[filter]);
  
  const pType=personalityTypes[d.topType]||personalityTypes.explorer;

  const calculateResults=()=>{
    const scores={};
    const typeScores={builder:0,analyst:0,helper:0,communicator:0,optimizer:0,creative:0,explorer:0,specialist:0};
    
    Object.entries(d.energy).forEach(([qId,rating])=>{
      const q=energyQuestions.find(x=>x.id===qId);
      if(q?.tags){const mult=(rating-3)/2;Object.entries(q.tags).forEach(([tag,weight])=>{if(typeScores.hasOwnProperty(tag))typeScores[tag]+=mult*weight;});}
    });
    Object.entries(d.workStyle).forEach(([qId,val])=>{
      const q=workStyleQuestions.find(x=>x.id===qId);const opt=q?.opts.find(o=>o.v===val);
      if(opt?.tags){Object.entries(opt.tags).forEach(([tag,weight])=>{if(typeScores.hasOwnProperty(tag))typeScores[tag]+=weight;});}
    });
    
    const sortedTypes=Object.entries(typeScores).sort((a,b)=>b[1]-a[1]);
    const topType=sortedTypes[0]?.[0]||'explorer';
    const topTypes=sortedTypes.slice(0,3).map(([t])=>t);
    
    Object.entries(C).forEach(([id,c])=>{
      let score=50;
      if(c.traits){c.traits.forEach(trait=>{const tl=trait.toLowerCase();topTypes.forEach((type,i)=>{if(tl.includes(type.slice(0,4))||type.includes(tl.slice(0,4)))score+=(5-i)*3;});});}
      if(c.vals){c.vals.forEach(val=>{Object.entries(d.values).forEach(([qId,choice])=>{const q=valueQuestions.find(x=>x.id===qId);const chosenTag=choice==='a'?q.tagA:q.tagB;if(val.includes(chosenTag)||chosenTag.includes(val))score+=8;});});}
      
      const finFlex=financialFlex.findIndex(f=>f.v===d.financialFlex)+1||2;
      if(finFlex===1){if(c.d===3)score-=25;if(c.s?.[0]===0)score-=30;}
      const urgency=timeframes.find(tf=>tf.v===d.timeframe)?.urgency||3;
      if(urgency>=4&&c.d===3)score-=20;if(urgency>=4&&c.d===1)score+=10;
      if(d.location==='remote'){if(['Very common','Yes','Often','Common'].includes(c.life?.r))score+=10;else if(['No','Rarely'].includes(c.life?.r))score-=15;}
      
      d.dealBreakers.forEach(dbId=>{
        const db=dealBreakers.find(x=>x.id===dbId);if(!db)return;
        if(db.tag==='meetings'&&c.truth?.some(t=>t.toLowerCase().includes('meeting')))score-=25;
        if(db.tag==='unstable'&&(c.s?.[0]===0||c.truth?.some(t=>t.toLowerCase().includes('famine'))))score-=30;
        if(db.tag==='sales'&&c.t.includes('Sales'))score-=25;
        if(db.tag==='longhours'&&c.truth?.some(t=>t.includes('60')||t.includes('80')))score-=25;
        if(db.tag==='degree'&&c.d===3)score-=25;
        if(db.tag==='physical'&&(c.c==='Trades'||c.c==='Outdoors'))score-=25;
      });
      
      if(c.d===1)score+=8;if(c.d===3)score-=5;
      scores[id]=Math.max(0,Math.min(100,Math.round(score)));
    });
    
    const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,20).map(([id,score])=>({id,...C[id],score}));
    u({results:sorted,topType});
    setShowConfetti(true);setTimeout(()=>setShowConfetti(false),3000);
    
    // Save results to localStorage so they persist
    const dataToSave={...d,results:sorted,topType};
    try{localStorage.setItem('careerClarity_results',JSON.stringify(dataToSave));}catch(e){}
    
    fetch('https://script.google.com/macros/s/AKfycbxi-vcsL2izUXE-UCNb98PFbAZHWv4QFCN-WYJic-o7Qg8W04VDgOb-nrQbUJUzfxWD/exec',{
      method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:d.name,email:d.email,website:'',topCareer1:sorted[0]?.t||'',topCareer2:sorted[1]?.t||'',topCareer3:sorted[2]?.t||'',topType})
    }).catch(console.log);
    
    setStep(100);
  };
  
  // Clear saved results and start fresh
  const clearResults=()=>{
    try{localStorage.removeItem('careerClarity_results');}catch(e){}
    setStep(0);
    setD({name:'',email:'',currentRole:'',experience:'',education:'',satisfaction:null,timeframe:'',financialFlex:'',riskTolerance:'',location:'',energy:{},workStyle:{},values:{},dealBreakers:[],fear:'',results:[],topType:''});
  };

  // ======== HOME ========
  if(mode==='home')return(
    <div style={{minHeight:'100vh',position:'relative',overflow:'hidden'}}>
      <div className="blob blob-1"></div>
      <div className="blob blob-2"></div>
      <div className="blob blob-3"></div>
      
      <nav style={{padding:'20px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'relative',zIndex:10}}>
        <div style={{fontFamily:"'Bricolage Grotesque'",fontSize:22,fontWeight:800}}>🧭 Career Clarity</div>
        <button className="btn btn-ghost" style={{padding:'10px 20px',fontSize:14}} onClick={()=>setMode('browse')}>Explore careers</button>
      </nav>
      
      <div style={{maxWidth:800,margin:'0 auto',padding:'60px 24px',textAlign:'center',position:'relative',zIndex:10}}>
        <div className="fade-up">
          <div style={{fontSize:72,marginBottom:24}} className="float">🧭</div>
          <h1 style={{fontSize:48,fontWeight:800,marginBottom:20,lineHeight:1.1}}>
            What if the right career is one<br/>you haven't heard of yet?
          </h1>
          <p style={{fontSize:20,color:'#52525B',maxWidth:520,margin:'0 auto 40px',lineHeight:1.6}}>
            Take a 5-minute quiz to see what careers could be a great match for you — based on your personality and interests.
          </p>
          
          <button className="btn btn-primary pop" style={{fontSize:20,padding:'22px 48px'}} onClick={()=>setMode('quiz')}>
            Take the quiz
          </button>
          
          <p style={{marginTop:20,fontSize:14,color:'#A1A1AA'}}>
            Free · No signup · Get a PDF of your results
          </p>
        </div>
        
        <div style={{marginTop:80,textAlign:'left'}}>
          <h2 style={{fontSize:24,fontWeight:700,marginBottom:24,textAlign:'center'}}>What you'll get</h2>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:20}}>
            {[
              {emoji:'🎯',title:'Your work personality',desc:'Understand why some work energizes you and other work drains you'},
              {emoji:'🗺️',title:'122 career paths',desc:'See careers you\'d never find on a job board'},
              {emoji:'⚡',title:'Honest trade-offs',desc:'Know the real trade-offs before you commit'}
            ].map((f,i)=>(
              <div key={i} className={"card fade-up delay-"+(i+1)} style={{padding:24}}>
                <div style={{fontSize:36,marginBottom:12}}>{f.emoji}</div>
                <h3 style={{fontSize:18,fontWeight:700,marginBottom:8}}>{f.title}</h3>
                <p style={{fontSize:15,color:'#52525B',lineHeight:1.5}}>{f.desc}</p>
              </div>
            ))}
          </div>
        </div>
        
        <div style={{marginTop:80}}>
          <h2 style={{fontSize:24,fontWeight:700,marginBottom:12}}>Beyond the obvious</h2>
          <p style={{fontSize:16,color:'#52525B',marginBottom:24}}>Careers in our database you might not know:</p>
          <div style={{display:'flex',flexWrap:'wrap',justifyContent:'center',gap:10}}>
            {['🕊️ Death Doula','🍷 Sommelier','🔐 Ethical Hacker','🗺️ Location Scout','😴 Sleep Consultant','🧬 Genetic Counselor','🎮 Esports Manager','🌬️ Wind Turbine Tech'].map((c,i)=>(
              <span key={i} className="pill">{c}</span>
            ))}
          </div>
        </div>
        
        <div style={{marginTop:80,marginBottom:40}}>
          <h2 style={{fontSize:24,fontWeight:700,marginBottom:24}}>This is for you if...</h2>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:16,textAlign:'left'}}>
            {[
              "You're figuring out what direction to go",
              "You're wondering if there's something better out there",
              "You're worried your job might change or disappear",
              "You've been thinking about a change but don't know where to start"
            ].map((t,i)=>(
              <div key={i} className="card-flat" style={{padding:20,display:'flex',gap:12,alignItems:'flex-start'}}>
                <span style={{fontSize:20,color:'#4ECDC4'}}>✓</span>
                <span style={{fontSize:15,color:'#52525B'}}>{t}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  // ======== BROWSE ========
  if(mode==='browse')return(
    <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
      <div style={{maxWidth:1100,margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24,flexWrap:'wrap',gap:16}}>
          <h1 style={{fontSize:28,fontWeight:800}}>Explore 122 careers</h1>
          <button className="btn btn-ghost" onClick={()=>setMode('home')}>← Back</button>
        </div>
        
        <div className="card" style={{padding:20,marginBottom:24}}>
          <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
            <input placeholder="Search..." value={filter.search} onChange={e=>setFilter(p=>({...p,search:e.target.value}))} style={{flex:1,minWidth:200,padding:'14px 20px',borderRadius:100,border:'2px solid #e8e8e8',fontSize:16,fontFamily:'DM Sans'}}/>
            <select value={filter.cat} onChange={e=>setFilter(p=>({...p,cat:e.target.value}))} style={{padding:'14px 20px',borderRadius:100,border:'2px solid #e8e8e8',fontSize:16,fontFamily:'DM Sans',background:'#fff'}}>
              <option value="">All categories</option>
              {categories.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>
        
        <p style={{marginBottom:16,color:'#52525B'}}>{filtered.length} careers</p>
        
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:20}}>
          {filtered.map(c=>(
            <div key={c.id} className="card pop" style={{padding:24}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <span style={{padding:'6px 14px',borderRadius:100,fontSize:12,fontWeight:600,background:catColors[c.c]||'#ddd',color:'#fff'}}>{c.c}</span>
                <span style={{fontSize:13,color:'#A1A1AA'}}>{c.d===1?'Easier':c.d===2?'Medium':'Longer'}</span>
              </div>
              <div style={{fontSize:32,marginBottom:8}}>{c.e}</div>
              <h3 style={{fontSize:20,fontWeight:700,marginBottom:8}}>{c.t}</h3>
              <p style={{fontSize:14,color:'#52525B',marginBottom:16,lineHeight:1.5}}>{c.desc}</p>
              <div style={{fontSize:16,fontWeight:700,color:'#4ECDC4'}}>${c.s?.[0]}K – ${c.s?.[2]}K+</div>
              <div style={{fontSize:13,color:'#A1A1AA',marginTop:4}}>{c.tm}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  // ======== QUIZ ========
  if(mode==='quiz'){
    const ProgressBar=()=>(<div className="progress-track" style={{marginBottom:24}}><div className="progress-fill" style={{width:progress+'%'}}></div></div>);
    const BackBtn=({onClick})=>(<button className="btn btn-ghost" style={{padding:'10px 20px',fontSize:14,marginBottom:20}} onClick={onClick||(()=>setStep(Math.max(0,step-1)))}>← Back</button>);

    if(step===0)return(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
        <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
          <button className="btn btn-ghost" style={{padding:'10px 20px',fontSize:14,marginBottom:20}} onClick={()=>setMode('home')}>← Back</button>
          <div className="card" style={{padding:32,textAlign:'center'}}>
            <div style={{fontSize:56,marginBottom:16}}>👋</div>
            <h1 style={{fontSize:28,fontWeight:800,marginBottom:12}}>Let's start</h1>
            <p style={{fontSize:16,color:'#52525B',marginBottom:24}}>This takes about 5 minutes. No right or wrong answers.</p>
            <input placeholder="Your first name" value={d.name} onChange={e=>u({name:e.target.value})} onKeyDown={e=>e.key==='Enter'&&d.name&&setStep(1)} autoFocus style={{width:'100%',padding:'18px 24px',borderRadius:16,border:'3px solid #e8e8e8',fontSize:18,fontFamily:'DM Sans',textAlign:'center',marginBottom:20}}/>
            <button className="btn btn-primary" style={{width:'100%'}} disabled={!d.name.trim()} onClick={()=>setStep(1)}>Continue</button>
          </div>
        </div>
      </div>
    );

    const OptionStep=({title,subtitle,options,value,onChange})=>(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
        <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
          <BackBtn/>
          <ProgressBar/>
          <div className="card" style={{padding:32}}>
            <h2 style={{fontSize:22,fontWeight:700,marginBottom:subtitle?8:20}}>{title}</h2>
            {subtitle&&<p style={{fontSize:15,color:'#52525B',marginBottom:20}}>{subtitle}</p>}
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {options.map(opt=>(
                <div key={opt.v||opt.l} className={"option"+(value===(opt.v??opt.l)?' active':'')} onClick={()=>{onChange(opt.v??opt.l);setTimeout(()=>setStep(step+1),200);}}>{opt.l}</div>
              ))}
            </div>
          </div>
        </div>
      </div>
    );

    if(step===1)return<OptionStep title={"What's your current situation, "+d.name+"?"} options={currentRoles} value={d.currentRole} onChange={v=>u({currentRole:v})}/>;
    if(step===2)return<OptionStep title="How long have you been working?" subtitle="Any professional experience counts." options={experienceLevels} value={d.experience} onChange={v=>u({experience:v})}/>;
    if(step===3)return<OptionStep title="Educational background?" subtitle="Helps us gauge realistic paths." options={educationLevels} value={d.education} onChange={v=>u({education:v})}/>;
    if(step===4)return<OptionStep title="How's your current situation?" options={satisfactionLevels.map(s=>({v:s.v,l:s.e+' '+s.l}))} value={d.satisfaction} onChange={v=>u({satisfaction:v})}/>;
    if(step===5)return<OptionStep title="How soon do you want to make a move?" options={timeframes} value={d.timeframe} onChange={v=>u({timeframe:v})}/>;
    if(step===6)return<OptionStep title="What's your financial flexibility?" subtitle="Some transitions require investment or time without income." options={financialFlex} value={d.financialFlex} onChange={v=>u({financialFlex:v})}/>;
    if(step===7)return<OptionStep title="How do you feel about risk?" options={riskTolerance} value={d.riskTolerance} onChange={v=>u({riskTolerance:v})}/>;
    if(step===8)return<OptionStep title="Where do you want to work?" options={locationPrefs} value={d.location} onChange={v=>u({location:v})}/>;

    // Energy questions
    if(step>=9&&step<=20){
      const qi=step-9;const q=energyQuestions[qi];
      return(
        <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
          <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
            <BackBtn/>
            <ProgressBar/>
            <div className="card" style={{padding:32,textAlign:'center'}}>
              <p style={{fontSize:13,color:'#A1A1AA',marginBottom:16}}>{qi+1} of 12</p>
              <h2 style={{fontSize:18,fontWeight:600,marginBottom:8,color:'#52525B'}}>How does this feel?</h2>
              <p style={{fontSize:20,color:'#1a1a2e',marginBottom:32,fontWeight:600}}>"{q.q}"</p>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}>
                {['😫','😕','😐','🙂','😍'].map((em,i)=>(
                  <span key={i} className={"emoji-btn"+(d.energy[q.id]===i+1?' active':'')} onClick={()=>{u({energy:{...d.energy,[q.id]:i+1}});setTimeout(()=>setStep(step+1),250);}}>{em}</span>
                ))}
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,color:'#A1A1AA'}}><span>Drains me</span><span>Energizes me</span></div>
            </div>
          </div>
        </div>
      );
    }

    // Work style
    if(step>=21&&step<=24){
      const qi=step-21;const q=workStyleQuestions[qi];
      return(
        <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
          <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
            <BackBtn/>
            <ProgressBar/>
            <div className="card" style={{padding:32}}>
              <p style={{fontSize:13,color:'#A1A1AA',marginBottom:8}}>Work style {qi+1}/4</p>
              <h2 style={{fontSize:22,fontWeight:700,marginBottom:20}}>{q.q}</h2>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {q.opts.map(opt=>(<div key={opt.v} className={"option"+(d.workStyle[q.id]===opt.v?' active':'')} onClick={()=>{u({workStyle:{...d.workStyle,[q.id]:opt.v}});setTimeout(()=>setStep(step+1),200);}}>{opt.l}</div>))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Values
    if(step>=25&&step<=30){
      const qi=step-25;const q=valueQuestions[qi];
      return(
        <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
          <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
            <BackBtn/>
            <ProgressBar/>
            <div className="card" style={{padding:32,textAlign:'center'}}>
              <p style={{fontSize:13,color:'#A1A1AA',marginBottom:16}}>Values {qi+1}/6</p>
              <h2 style={{fontSize:22,fontWeight:700,marginBottom:24}}>{q.q}</h2>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                <div className={"card pop"+(d.values[q.id]==='a'?' gradient-bg':'')} style={{padding:24,cursor:'pointer'}} onClick={()=>{u({values:{...d.values,[q.id]:'a'}});setTimeout(()=>setStep(step+1),200);}}>
                  <div style={{fontSize:15,fontWeight:600}}>{q.a}</div>
                </div>
                <div className={"card pop"+(d.values[q.id]==='b'?' gradient-bg':'')} style={{padding:24,cursor:'pointer'}} onClick={()=>{u({values:{...d.values,[q.id]:'b'}});setTimeout(()=>setStep(step+1),200);}}>
                  <div style={{fontSize:15,fontWeight:600}}>{q.b}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Deal breakers
    if(step===31)return(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
        <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
          <BackBtn/>
          <ProgressBar/>
          <div className="card" style={{padding:32}}>
            <h2 style={{fontSize:22,fontWeight:700,marginBottom:8}}>Any deal breakers?</h2>
            <p style={{fontSize:15,color:'#52525B',marginBottom:24}}>Things you won't tolerate in a job.</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:10,marginBottom:24}}>
              {dealBreakers.map(db=>(<span key={db.id} className={"pill"+(d.dealBreakers.includes(db.id)?' active':'')} onClick={()=>u({dealBreakers:d.dealBreakers.includes(db.id)?d.dealBreakers.filter(x=>x!==db.id):[...d.dealBreakers,db.id]})}>{db.l}</span>))}
            </div>
            <button className="btn btn-primary" style={{width:'100%'}} onClick={()=>setStep(32)}>Continue</button>
          </div>
        </div>
      </div>
    );

    // Fear
    if(step===32)return<OptionStep title="What's your biggest concern about making a change?" options={[{v:'wrong-choice',l:'Choosing wrong'},{v:'not-qualified',l:'Not being qualified'},{v:'money',l:'Financial impact'},{v:'starting-over',l:'Starting over'},{v:'age',l:'Being too old/young'},{v:'judgment',l:'What others think'},{v:'none',l:'Not particularly worried'}]} value={d.fear} onChange={v=>u({fear:v})}/>;

    // Email
    if(step===33)return(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
        <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
          <BackBtn/>
          <ProgressBar/>
          <div className="card" style={{padding:32,textAlign:'center'}}>
            <div style={{fontSize:56,marginBottom:16}}>🎉</div>
            <h2 style={{fontSize:24,fontWeight:700,marginBottom:12}}>Almost there</h2>
            <p style={{fontSize:15,color:'#52525B',marginBottom:24}}>Where should we send your results?</p>
            <input type="email" placeholder="your@email.com" value={d.email} onChange={e=>u({email:e.target.value})} style={{width:'100%',padding:'18px 24px',borderRadius:16,border:'3px solid #e8e8e8',fontSize:18,fontFamily:'DM Sans',textAlign:'center',marginBottom:16}}/>
            <button className="btn btn-primary" style={{width:'100%',marginBottom:12}} onClick={calculateResults}>See my results</button>
            <button className="btn btn-ghost" style={{width:'100%'}} onClick={calculateResults}>Skip</button>
          </div>
        </div>
      </div>
    );

    // ======== RESULTS ========
    if(step===100){
      const handleSaveEmail=(email)=>{
        u({email});
        // Save to Google Sheets
        fetch('https://script.google.com/macros/s/AKfycbxi-vcsL2izUXE-UCNb98PFbAZHWv4QFCN-WYJic-o7Qg8W04VDgOb-nrQbUJUzfxWD/exec',{
          method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({name:d.name,email,website:'',topCareer1:d.results[0]?.t||'',topCareer2:d.results[1]?.t||'',topCareer3:d.results[2]?.t||'',topType:d.topType})
        }).catch(console.log);
        // Update localStorage
        try{localStorage.setItem('careerClarity_results',JSON.stringify({...d,email}));}catch(e){}
        setShowSaveModal(false);
      };
      
      return(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24,position:'relative'}}>
        {showConfetti&&<Confetti/>}
        {showSaveModal&&!d.email&&<SaveModal onSave={handleSaveEmail} onClose={()=>setShowSaveModal(false)}/>}
        <div style={{maxWidth:600,margin:'0 auto'}}>
          
          <div className="card fade-up" style={{padding:32,textAlign:'center',background:'linear-gradient(135deg,#FFE66D 0%,#FF6B6B 100%)',marginBottom:24}}>
            <p style={{fontSize:16,marginBottom:8}}>Hey {d.name}</p>
            <h1 style={{fontSize:32,fontWeight:800}}>Here's what we found</h1>
          </div>
          
          <div className="card fade-up delay-1" style={{padding:32,textAlign:'center',background:pType.bg,marginBottom:24}}>
            <div style={{fontSize:64,marginBottom:12}}>{pType.emoji}</div>
            <h2 style={{fontSize:28,fontWeight:800,color:pType.color,marginBottom:12}}>{pType.name}</h2>
            <p style={{fontSize:16,color:'#52525B',marginBottom:20,lineHeight:1.6}}>{pType.desc}</p>
            <div style={{display:'flex',flexWrap:'wrap',justifyContent:'center',gap:8}}>
              {pType.strengths.map((s,i)=>(<span key={i} style={{background:'#fff',padding:'8px 16px',borderRadius:100,fontSize:14,fontWeight:600,border:'2px solid '+pType.color}}>{s}</span>))}
            </div>
          </div>
          
          <button className="btn btn-primary pop" style={{width:'100%',marginBottom:24}} onClick={()=>generatePDF(d)}>
            📥 Download PDF
          </button>
          
          {d.fear&&d.fear!=='none'&&(
            <div className="card fade-up" style={{padding:24,background:'#FFF8E1',marginBottom:24}}>
              <div style={{fontSize:13,fontWeight:700,color:'#F9B208',marginBottom:8}}>About your concern</div>
              <p style={{fontSize:15,lineHeight:1.6,margin:0}}>{fearMessages[d.fear]}</p>
            </div>
          )}
          
          <h2 style={{fontSize:22,fontWeight:700,marginBottom:16}}>Your top matches</h2>
          
          {d.results.slice(0,5).map((c,i)=>(
            <div key={c.id} className="card fade-up" style={{padding:24,marginBottom:16,border:i===0?'3px solid #4ECDC4':'3px solid #1a1a2e'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <span style={{width:28,height:28,borderRadius:'50%',background:'#1a1a2e',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:14}}>{i+1}</span>
                  <span style={{padding:'4px 12px',borderRadius:100,fontSize:12,fontWeight:600,background:catColors[c.c]||'#ddd',color:'#fff'}}>{c.c}</span>
                </div>
                <span style={{fontSize:16,fontWeight:700,color:'#4ECDC4'}}>{c.score}%</span>
              </div>
              
              <div style={{fontSize:32,marginBottom:8}}>{c.e}</div>
              <h3 style={{fontSize:20,fontWeight:700,marginBottom:8}}>{c.t}</h3>
              <p style={{fontSize:15,color:'#52525B',marginBottom:16}}>{c.desc}</p>
              
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
                <div style={{background:'#f5f5f5',padding:12,borderRadius:12}}>
                  <div style={{fontSize:11,color:'#A1A1AA'}}>SALARY</div>
                  <div style={{fontSize:16,fontWeight:700,color:'#4ECDC4'}}>${c.s?.[0]}K – ${c.s?.[2]}K+</div>
                </div>
                <div style={{background:'#f5f5f5',padding:12,borderRadius:12}}>
                  <div style={{fontSize:11,color:'#A1A1AA'}}>TRANSITION</div>
                  <div style={{fontSize:16,fontWeight:700}}>{c.tm}</div>
                </div>
              </div>
              
              <div style={{fontSize:12,fontWeight:700,color:'#A1A1AA',marginBottom:8}}>What to know</div>
              {c.truth?.slice(0,3).map((t,j)=>(<p key={j} style={{fontSize:14,color:'#52525B',marginBottom:4,paddingLeft:12,borderLeft:'3px solid #FFE66D'}}>{t}</p>))}
            </div>
          ))}
          
          <div className="card" style={{padding:24,background:'#E8F5E9',marginBottom:24}}>
            <h3 style={{fontSize:18,fontWeight:700,marginBottom:12}}>Next step</h3>
            <p style={{fontSize:15,lineHeight:1.6,margin:0}}>
              Find 3 people on LinkedIn with the title "<strong>{d.results[0]?.t}</strong>". Send a short note asking for 15 minutes to learn about their path. Most people say yes.
            </p>
          </div>
          
          <button className="btn btn-secondary" style={{width:'100%',marginBottom:12}} onClick={()=>setMode('browse')}>Explore all careers</button>
          <button className="btn btn-ghost" style={{width:'100%'}} onClick={clearResults}>Start over</button>
          
          <p style={{textAlign:'center',fontSize:14,color:'#A1A1AA',marginTop:24}}>Know someone who'd find this useful? Share it.</p>
        </div>
      </div>
    );}
  
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
