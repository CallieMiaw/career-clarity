// Helper to generate quick match reasons for results preview
const getMatchReasons=(career,userData)=>{
  const reasons=[];
  if(career.domains&&userData.domains){
    const matches=career.domains.filter(d=>userData.domains.includes(d));
    if(matches.length>0){
      const labels=matches.slice(0,2).map(m=>domainOptions.find(o=>o.id===m)?.label).filter(Boolean);
      reasons.push('Matches your interest in '+labels.join(' & '));
    }
  }
  if(career.activities&&userData.activities){
    const matches=career.activities.filter(a=>userData.activities.includes(a));
    if(matches.length>0){
      const labels=matches.slice(0,2).map(m=>activityOptions.find(o=>o.id===m)?.label).filter(Boolean);
      reasons.push('Involves '+labels.join(' & ').toLowerCase());
    }
  }
  if(career.fit&&userData.topType){
    const fitScore=career.fit[userData.topType];
    if(fitScore&&fitScore>=0.7){
      reasons.push('Great fit for '+personalityTypes[userData.topType]?.name?.toLowerCase()+'s');
    }
  }
  // Add avoided activities check
  if(career.avoids&&userData.avoids){
    const avoided=career.avoids.filter(a=>userData.avoids.includes(a));
    if(avoided.length===0&&userData.avoids.length>0){
      reasons.push('Avoids things you dislike');
    }
  }
  return reasons.slice(0,2); // Return max 2 reasons for preview
};

const CopyBox=({text,label})=>{
  const[copied,setCopied]=useState(false);
  const handleCopy=()=>{
    navigator.clipboard.writeText(text);
    setCopied(true);
    setTimeout(()=>setCopied(false),2000);
  };
  return(
    <div>
      {label&&<div style={{fontSize:13,fontWeight:600,marginBottom:8,color:'#52525B'}}>{label}</div>}
      <div className={"copy-box"+(copied?' copied':'')} onClick={handleCopy}>
        {text}
        <div style={{marginTop:12,fontSize:12,color:copied?'#4ECDC4':'#A1A1AA',fontWeight:600}}>
          {copied?'✓ Copied!':'Click to copy'}
        </div>
      </div>
    </div>
  );
};

            That's it. One 15-minute coffee chat will tell you more than hours of research. Here's how:
          </p>
          
          <div style={{display:'grid',gap:16}}>
            <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>
              <span style={{width:32,height:32,borderRadius:'50%',background:'#4ECDC4',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,flexShrink:0}}>1</span>
              <div>
                <div style={{fontWeight:600,marginBottom:4}}>Find someone to talk to</div>

            </div>
            <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>
              <span style={{width:32,height:32,borderRadius:'50%',background:'#4ECDC4',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,flexShrink:0}}>2</span>

            <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>
              <span style={{width:32,height:32,borderRadius:'50%',background:'#4ECDC4',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,flexShrink:0}}>3</span>
              <div>
                <div style={{fontWeight:600,marginBottom:4}}>Ask the right questions</div>
                <div style={{fontSize:14,color:'#52525B'}}>Use the questions at the bottom. End with "Who else should I talk to?"</div>
              </div>
            </div>
          </div>
        </div>

        {/* Personalized Outreach Section */}
        <PersonalizedOutreach career={career} userName={userData.name}/>

        {/* Coffee Chat Questions - condensed */}

          <p style={{fontSize:15,color:'#52525B',marginBottom:16}}>Pick 3-4 for your conversation:</p>
          <div style={{display:'grid',gap:8}}>
            {coffeeChatQuestions.slice(0,5).map((q,i)=>(
              <div key={i} style={{display:'flex',gap:12,padding:'12px 16px',background:'#f9f9f9',borderRadius:10}}>
                <span style={{color:'#4ECDC4',fontWeight:700}}>{i+1}.</span>
                <span style={{fontSize:15}}>{q}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Bottom CTAs */}
        <div style={{display:'flex',gap:12,flexWrap:'wrap',marginTop:32}}>
          <button className="btn btn-primary pop" style={{flex:1,minWidth:200}} onClick={onExploreAnother}>
            Explore another match
          </button>
          <button className="btn btn-secondary pop" style={{flex:1,minWidth:200}} onClick={onBack}>
            Back to all results
          </button>
        </div>
      </div>
    </div>
  );
};
// Main App
function App(){
  const getSavedData=()=>{try{const s=localStorage.getItem('careerClarity_v2');return s?JSON.parse(s):null;}catch(e){return null;}};
  const savedData=getSavedData();
  
  const[mode,setMode]=useState(savedData?'quiz':'home');
  const[step,setStep]=useState(savedData?.results?.length?100:0);
  const[showConfetti,setShowConfetti]=useState(false);
  const[selectedCareer,setSelectedCareer]=useState(null);
  const[filter,setFilter]=useState({cat:'',search:''});
  const[d,setD]=useState(savedData||{
    name:'',email:'',currentRole:'',experience:'',satisfaction:null,timeframe:'',financialFlex:'',location:'',
    domains:[],activities:[],avoids:[],energy:{},
    fear:'',results:[],topType:'',tradeoffs:{}
  });
  const u=x=>setD(p=>({...p,...x}));
  
  const totalSteps=16;
  const progress=Math.min(100,(step/totalSteps)*100);
  const categories=useMemo(()=>[...new Set(Object.values(C).map(c=>c.c))].sort(),[]);
  const filtered=useMemo(()=>Object.entries(C).filter(([id,c])=>{
    if(filter.cat&&c.c!==filter.cat)return false;
    if(filter.search&&!c.t.toLowerCase().includes(filter.search.toLowerCase()))return false;
    return true;
  }).map(([id,c])=>({id,...c})),[filter]);
  
  const pType=personalityTypes[d.topType]||personalityTypes.explorer;

  const calculateResults=()=>{
    const scores={};
    const typeScores={builder:0,analyst:0,helper:0,communicator:0,optimizer:0,creative:0,explorer:0,specialist:0};
    
    // Calculate personality from tradeoff questions
    Object.entries(d.tradeoffs||{}).forEach(([qId,choice])=>{
      const q=tradeoffQuestions.find(x=>x.id===qId);
      if(q){
        if(choice==='a'&&q.aTag&&typeScores[q.aTag]!==undefined)typeScores[q.aTag]+=2;
        if(choice==='b'&&q.bTag&&typeScores[q.bTag]!==undefined)typeScores[q.bTag]+=2;
      }
    });
    
    const sortedTypes=Object.entries(typeScores).sort((a,b)=>b[1]-a[1]);
    const topType=sortedTypes[0]?.[0]||'explorer';
    
    Object.entries(C).forEach(([id,c])=>{
      let score=40;
      if(c.domains&&d.domains.length){
        const domainMatches=c.domains.filter(dom=>d.domains.includes(dom)).length;
        score+=domainMatches*15;
      }
      if(c.activities&&d.activities.length){
        const actMatches=c.activities.filter(act=>d.activities.includes(act)).length;
        score+=actMatches*12;
      }
      if(c.activities&&d.avoids.length){
        const avoidMatches=c.activities.filter(act=>d.avoids.includes(act)).length;
        score-=avoidMatches*10;
      }
      if(c.fit){
        Object.entries(c.fit).forEach(([type,fitScore])=>{
          const userTypeScore=typeScores[type]||0;
          score+=userTypeScore*fitScore*3;
        });
      }
      if(d.financialFlex==='tight'&&c.d===3)score-=15;
      if(d.financialFlex==='tight'&&c.s?.[0]<40)score-=20;
      if(d.timeframe==='asap'&&c.d===3)score-=15;
      if(d.timeframe==='asap'&&c.d===1)score+=10;
      if(c.d===1)score+=5;
      scores[id]=Math.max(0,Math.min(100,Math.round(score)));
    });
    
    const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([id,score])=>({id,...C[id],score}));
    
    const newData={...d,results:sorted,topType};
    u({results:sorted,topType});
    try{localStorage.setItem('careerClarity_v2',JSON.stringify(newData));}catch(e){}
    
    setShowConfetti(true);setTimeout(()=>setShowConfetti(false),3000);
    
    fetch('https://script.google.com/macros/s/AKfycbxi-vcsL2izUXE-UCNb98PFbAZHWv4QFCN-WYJic-o7Qg8W04VDgOb-nrQbUJUzfxWD/exec',{
      method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:d.name,email:d.email,website:'',topCareer1:sorted[0]?.t||'',topCareer2:sorted[1]?.t||'',topCareer3:sorted[2]?.t||'',topType})
    }).catch(console.log);
    
    setStep(100);
  };
  
  const clearResults=()=>{
    try{localStorage.removeItem('careerClarity_v2');}catch(e){}
    setStep(0);setSelectedCareer(null);
    setD({name:'',email:'',currentRole:'',experience:'',satisfaction:null,timeframe:'',financialFlex:'',location:'',domains:[],activities:[],avoids:[],tradeoffs:{},fear:'',results:[],topType:''});
  };

  // Career Detail View
  if(selectedCareer){
    return <CareerDetailPage 
      career={selectedCareer} 
      userData={d} 
      onBack={()=>setSelectedCareer(null)}
      onExploreAnother={()=>{
        const others=d.results.filter(r=>r.id!==selectedCareer.id);
        if(others.length)setSelectedCareer(others[0]);
        else setSelectedCareer(null);
      }}
    />;
  }

  // HOME
  if(mode==='home')return(
    <div style={{minHeight:'100vh',position:'relative',overflow:'hidden'}}>
      <div className="blob blob-1"></div>
      <div className="blob blob-2"></div>
      <div className="blob blob-3"></div>
      
      <nav style={{padding:'20px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'relative',zIndex:10}}>
        <div style={{fontFamily:"'Bricolage Grotesque'",fontSize:22,fontWeight:800}}>🧭 Career Clarity</div>
        <button className="btn btn-ghost btn-small" onClick={()=>setMode('browse')}>Explore careers</button>
      </nav>
      
      <div style={{maxWidth:800,margin:'0 auto',padding:'60px 24px',textAlign:'center',position:'relative',zIndex:10}}>
        <div className="fade-up">
          <div style={{fontSize:72,marginBottom:24}} className="float">🧭</div>
          <h1 style={{fontSize:48,fontWeight:800,marginBottom:20,lineHeight:1.1}}>
            What if the right career is one<br/>you haven't heard of yet?
          </h1>
          <p style={{fontSize:20,color:'#52525B',maxWidth:540,margin:'0 auto 40px',lineHeight:1.6}}>
            5-minute quiz → personalized matches → step-by-step playbook to explore them.
          </p>
          
          <button className="btn btn-primary pop" style={{fontSize:20,padding:'22px 48px'}} onClick={()=>setMode('quiz')}>
            Find my matches →
          </button>
          
          <p style={{marginTop:20,fontSize:14,color:'#A1A1AA'}}>Free · 180 careers · No signup required</p>
        </div>
        
        {/* Social proof / differentiator */}
        <div className="card fade-up delay-1" style={{marginTop:48,padding:20,background:'linear-gradient(135deg,#E8F5E9,#fff)',border:'2px solid #bbf7d0'}}>
          <p style={{fontSize:15,color:'#52525B',margin:0}}>
            <strong style={{color:'#16a34a'}}>Not just another career quiz.</strong> We give you a complete action plan — who to talk to, what to ask, and how to find them.
          </p>
        </div>
        
        <div style={{marginTop:60,textAlign:'left'}}>
          <h2 style={{fontSize:24,fontWeight:700,marginBottom:8,textAlign:'center'}}>Here's exactly what you get</h2>
          <p style={{fontSize:15,color:'#52525B',textAlign:'center',marginBottom:32}}>Everything you need to go from "I don't know what I want" to having real conversations</p>
          
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:20}}>
            {[
              {emoji:'🎯',title:'Your top 3 matches',desc:'Curated careers based on your interests, personality, and constraints — not 50 random options'},
              {emoji:'📋',title:'4-week action plan',desc:'Exactly what to do each week: research → outreach → conversations → decide'},
              {emoji:'💬',title:'LinkedIn message templates',desc:'Copy-paste outreach messages personalized to your background (alumni, company, location)'},
              {emoji:'🔍',title:'X-ray search queries',desc:'Pre-built Google searches to find the right people on LinkedIn — bypasses premium limits'},
              {emoji:'☕',title:'Coffee chat questions',desc:'8 questions to ask in informational interviews so you learn what really matters'},
              {emoji:'🧠',title:'Why it matched you',desc:'See exactly why each career was recommended based on your quiz answers'}
            ].map((f,i)=>(
              <div key={i} className={"card fade-up delay-"+(i%3+1)} style={{padding:24}}>
                <div style={{fontSize:32,marginBottom:12}}>{f.emoji}</div>
                <h3 style={{fontSize:16,fontWeight:700,marginBottom:8}}>{f.title}</h3>
                <p style={{fontSize:14,color:'#52525B',lineHeight:1.5}}>{f.desc}</p>
              </div>
            ))}
          </div>
          
          {/* Bottom CTA */}
          <div style={{marginTop:48,textAlign:'center'}}>
            <button className="btn btn-primary pop" style={{fontSize:18,padding:'18px 40px'}} onClick={()=>setMode('quiz')}>
              Take the 5-minute quiz →
            </button>
          </div>
        </div>
      </div>
    </div>
  );

  // BROWSE
  if(mode==='browse')return(
    <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
      <div style={{maxWidth:1100,margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24,flexWrap:'wrap',gap:16}}>
          <h1 style={{fontSize:28,fontWeight:800}}>Explore 180 careers</h1>
          <button className="btn btn-ghost btn-small" onClick={()=>setMode('home')}>← Back</button>
        </div>
        
        <div className="card" style={{padding:20,marginBottom:24}}>
          <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
            <input placeholder="Search..." value={filter.search} onChange={e=>setFilter(p=>({...p,search:e.target.value}))} style={{flex:1,minWidth:200,padding:'14px 20px',borderRadius:100,border:'2px solid #e8e8e8',fontSize:16,fontFamily:'DM Sans'}}/>
            <select value={filter.cat} onChange={e=>setFilter(p=>({...p,cat:e.target.value}))} style={{padding:'14px 20px',borderRadius:100,border:'2px solid #e8e8e8',fontSize:16,fontFamily:'DM Sans',background:'#fff'}}>
              <option value="">All categories</option>
              {categories.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>
        
        <p style={{marginBottom:16,color:'#52525B'}}>{filtered.length} careers</p>
        
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:20}}>
          {filtered.map(c=>(
            <div key={c.id} className="card pop" style={{padding:24,cursor:'pointer'}} onClick={()=>{setSelectedCareer({...c,score:null});setMode('quiz');}}>
              <span className="tag" style={{background:catColors[c.c]||'#ddd',color:'#fff',marginBottom:12}}>{c.c}</span>
              <div style={{fontSize:32,marginBottom:8}}>{c.e}</div>
              <h3 style={{fontSize:20,fontWeight:700,marginBottom:8}}>{c.t}</h3>
              <p style={{fontSize:14,color:'#52525B',marginBottom:16}}>{c.desc}</p>
              <div style={{fontSize:16,fontWeight:700,color:'#4ECDC4'}}>${c.s?.[0]}K – ${c.s?.[2]}K+</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
  // QUIZ
  if(mode==='quiz'){
    const ProgressBar=()=>(<div className="progress-track" style={{marginBottom:24}}><div className="progress-fill" style={{width:progress+'%'}}></div></div>);
    const BackBtn=()=>(<button className="btn btn-ghost btn-small" style={{marginBottom:20}} onClick={()=>setStep(Math.max(0,step-1))}>← Back</button>);

    if(step===0)return(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
        <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
          <button className="btn btn-ghost btn-small" style={{marginBottom:20}} onClick={()=>setMode('home')}>← Back</button>
          <div className="card" style={{padding:32,textAlign:'center'}}>
            <div style={{fontSize:56,marginBottom:16}}>👋</div>
            <h1 style={{fontSize:28,fontWeight:800,marginBottom:12}}>Let's start</h1>
            <p style={{fontSize:16,color:'#52525B',marginBottom:24}}>5 minutes. No right or wrong answers.</p>
            <input placeholder="Your first name" value={d.name} onChange={e=>u({name:e.target.value})} onKeyDown={e=>e.key==='Enter'&&d.name&&setStep(1)} autoFocus style={{width:'100%',padding:'18px 24px',borderRadius:16,border:'3px solid #e8e8e8',fontSize:18,fontFamily:'DM Sans',textAlign:'center',marginBottom:20}}/>
            <button className="btn btn-primary" style={{width:'100%'}} disabled={!d.name.trim()} onClick={()=>setStep(1)}>Continue</button>
          </div>
        </div>
      </div>
    );

    const OptionStep=({title,options,value,onChange})=>(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
        <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
          <BackBtn/>
          <ProgressBar/>
          <div className="card" style={{padding:32}}>
            <h2 style={{fontSize:22,fontWeight:700,marginBottom:20}}>{title}</h2>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {options.map(opt=>(
                <div key={opt.v||opt.l} className={"option"+(value===(opt.v??opt.l)?' active':'')} onClick={()=>{onChange(opt.v??opt.l);setTimeout(()=>setStep(step+1),200);}}>{opt.e?opt.e+' ':''}{opt.l}</div>
              ))}
            </div>
          </div>
        </div>
      </div>
    );

    if(step===1)return<OptionStep title={"What's your situation, "+d.name+"?"} options={currentRoles} value={d.currentRole} onChange={v=>u({currentRole:v})}/>;
    if(step===2)return<OptionStep title="How long have you been working?" options={experienceLevels} value={d.experience} onChange={v=>u({experience:v})}/>;
    if(step===3)return<OptionStep title="How soon are you looking to make a move?" options={timeframes} value={d.timeframe} onChange={v=>u({timeframe:v})}/>;
    if(step===4)return<OptionStep title="Financial flexibility?" options={financialFlex} value={d.financialFlex} onChange={v=>u({financialFlex:v})}/>;
    if(step===5)return<OptionStep title="Where do you want to work?" options={locationPrefs} value={d.location} onChange={v=>u({location:v})}/>;

    if(step===6)return(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
        <div style={{maxWidth:600,margin:'0 auto'}} className="fade-up">
          <BackBtn/><ProgressBar/>
          <div className="card" style={{padding:32}}>
            <h2 style={{fontSize:22,fontWeight:700,marginBottom:8}}>What worlds interest you?</h2>
            <p style={{fontSize:15,color:'#52525B',marginBottom:24}}>Pick 2-5.</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(100px,1fr))',gap:12,marginBottom:24}}>
              {domainOptions.map(opt=>(<div key={opt.id} className={"domain-card"+(d.domains.includes(opt.id)?' active':'')} onClick={()=>u({domains:d.domains.includes(opt.id)?d.domains.filter(x=>x!==opt.id):[...d.domains,opt.id]})}><div style={{fontSize:28}}>{opt.emoji}</div><div style={{fontSize:12,marginTop:4}}>{opt.label}</div></div>))}
            </div>
            <button className="btn btn-primary" style={{width:'100%'}} disabled={d.domains.length<2} onClick={()=>setStep(7)}>Continue</button>
          </div>
        </div>
      </div>
    );

    if(step===7)return(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
        <div style={{maxWidth:600,margin:'0 auto'}} className="fade-up">
          <BackBtn/><ProgressBar/>
          <div className="card" style={{padding:32}}>
            <h2 style={{fontSize:22,fontWeight:700,marginBottom:8}}>What do you want to spend time doing?</h2>
            <p style={{fontSize:15,color:'#52525B',marginBottom:24}}>Pick 3-5.</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(100px,1fr))',gap:12,marginBottom:24}}>
              {activityOptions.map(opt=>(<div key={opt.id} className={"domain-card"+(d.activities.includes(opt.id)?' active':'')} onClick={()=>u({activities:d.activities.includes(opt.id)?d.activities.filter(x=>x!==opt.id):[...d.activities,opt.id]})}><div style={{fontSize:28}}>{opt.emoji}</div><div style={{fontSize:12,marginTop:4}}>{opt.label}</div></div>))}
            </div>
            <button className="btn btn-primary" style={{width:'100%'}} disabled={d.activities.length<3} onClick={()=>setStep(8)}>Continue</button>
          </div>
        </div>
      </div>
    );

    if(step===8)return(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
        <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
          <BackBtn/><ProgressBar/>
          <div className="card" style={{padding:32}}>
            <h2 style={{fontSize:22,fontWeight:700,marginBottom:8}}>What do you want to avoid?</h2>
            <p style={{fontSize:15,color:'#52525B',marginBottom:24}}>Select any.</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:10,marginBottom:24}}>
              {avoidOptions.map(opt=>(<span key={opt.id} className={"pill"+(d.avoids.includes(opt.id)?' active':'')} onClick={()=>u({avoids:d.avoids.includes(opt.id)?d.avoids.filter(x=>x!==opt.id):[...d.avoids,opt.id]})}>{opt.label}</span>))}
            </div>
            <button className="btn btn-primary" style={{width:'100%'}} onClick={()=>setStep(9)}>Continue</button>
          </div>
        </div>
      </div>
    );

    if(step>=9&&step<=14){
      const qi=step-9;const q=tradeoffQuestions[qi];
      if(!q){setStep(15);return null;}
      return(
        <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
          <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
            <BackBtn/><ProgressBar/>
            <div className="card" style={{padding:32,textAlign:'center'}}>
              <p style={{fontSize:13,color:'#A1A1AA',marginBottom:16}}>{qi+1} of 6</p>
              <h2 style={{fontSize:18,fontWeight:600,marginBottom:24,color:'#52525B'}}>{q.q}</h2>
              <p style={{fontSize:14,color:'#A1A1AA',marginBottom:20}}>If you had to choose one:</p>
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <div 
                  className={"option"+(d.tradeoffs?.[q.id]==='a'?' active':'')} 
                  style={{padding:20,fontSize:17,fontWeight:600}}
                  onClick={()=>{u({tradeoffs:{...d.tradeoffs,[q.id]:'a'}});setTimeout(()=>setStep(step+1),200);}}
                >
                  {q.a}
                </div>
                <div style={{fontSize:13,color:'#A1A1AA'}}>or</div>
                <div 
                  className={"option"+(d.tradeoffs?.[q.id]==='b'?' active':'')} 
                  style={{padding:20,fontSize:17,fontWeight:600}}
                  onClick={()=>{u({tradeoffs:{...d.tradeoffs,[q.id]:'b'}});setTimeout(()=>setStep(step+1),200);}}
                >
                  {q.b}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    if(step===15)return(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
        <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
          <BackBtn/><ProgressBar/>
          <div className="card" style={{padding:32}}>
            <h2 style={{fontSize:22,fontWeight:700,marginBottom:20}}>Biggest concern about change?</h2>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {[{v:'wrong-choice',l:'Choosing wrong'},{v:'not-qualified',l:'Not qualified'},{v:'money',l:'Financial impact'},{v:'starting-over',l:'Starting over'},{v:'age',l:'Too old/young'},{v:'judgment',l:'What others think'},{v:'none',l:'Not worried'}].map(opt=>(
                <div key={opt.v} className={"option"+(d.fear===opt.v?' active':'')} onClick={()=>{u({fear:opt.v});setTimeout(()=>setStep(16),200);}}>{opt.l}</div>
              ))}
            </div>
          </div>
        </div>
      </div>
    );

    if(step===16)return(
      <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24}}>
        <div style={{maxWidth:500,margin:'0 auto'}} className="fade-up">
          <BackBtn/><ProgressBar/>
          <div className="card" style={{padding:32,textAlign:'center'}}>
            <div style={{fontSize:56,marginBottom:16}}>🎉</div>
            <h2 style={{fontSize:24,fontWeight:700,marginBottom:12}}>Ready!</h2>
            <p style={{fontSize:15,color:'#52525B',marginBottom:24}}>Where should we send your results?</p>
            <input type="email" placeholder="your@email.com (optional)" value={d.email} onChange={e=>u({email:e.target.value})} style={{width:'100%',padding:'18px 24px',borderRadius:16,border:'3px solid #e8e8e8',fontSize:18,fontFamily:'DM Sans',textAlign:'center',marginBottom:16}}/>
            <button className="btn btn-primary" style={{width:'100%'}} onClick={calculateResults}>See my matches →</button>
          </div>
        </div>
      </div>
    );

    // RESULTS - Simplified to Top 3
    if(step===100){
      const top3=d.results.slice(0,3);
      
      return(
        <div style={{minHeight:'100vh',background:'#FFFBF5',padding:24,position:'relative'}}>
          {showConfetti&&<Confetti/>}
          <div style={{maxWidth:600,margin:'0 auto'}}>
            
            {/* Header */}
            <div className="card fade-up" style={{padding:32,textAlign:'center',background:'linear-gradient(135deg,#FFE66D,#FF6B6B)',marginBottom:24}}>
              <p style={{fontSize:16,marginBottom:8}}>Hey {d.name} 👋</p>
              <h1 style={{fontSize:28,fontWeight:800}}>We found your top 3 matches</h1>
            </div>

            {/* Personality */}
            <div className="card fade-up delay-1" style={{padding:24,textAlign:'center',background:pType.bg,marginBottom:24}}>
              <div style={{fontSize:48,marginBottom:8}}>{pType.emoji}</div>
              <h2 style={{fontSize:22,fontWeight:700,color:pType.color,marginBottom:8}}>{pType.name}</h2>
              <p style={{fontSize:15,color:'#52525B'}}>{pType.desc}</p>
            </div>

            {/* Top 3 Cards */}
            <div className="section-header" style={{marginBottom:16}}>Your matches</div>
            
            {top3.map((c,i)=>{
              const reasons=getMatchReasons(c,d);
              return(
              <div key={c.id} className="card fade-up pop" style={{padding:0,marginBottom:20,cursor:'pointer',border:i===0?'3px solid #4ECDC4':'3px solid #1a1a2e',overflow:'hidden'}} onClick={()=>setSelectedCareer(c)}>
                {/* Card content */}
                <div style={{padding:24}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <span style={{width:32,height:32,borderRadius:'50%',background:i===0?'#4ECDC4':'#1a1a2e',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:16}}>{i+1}</span>
                      <span className="tag" style={{background:catColors[c.c]||'#ddd',color:'#fff'}}>{c.c}</span>
                    </div>
                    <span style={{fontSize:18,fontWeight:700,color:'#4ECDC4'}}>{c.score}% match</span>
                  </div>
                  
                  <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>
                    <div style={{fontSize:40}}>{c.e}</div>
                    <div style={{flex:1}}>
                      <h3 style={{fontSize:20,fontWeight:700,marginBottom:6}}>{c.t}</h3>
                      <p style={{fontSize:14,color:'#52525B',marginBottom:12}}>{c.desc}</p>
                      <div style={{display:'flex',gap:16,fontSize:13}}>
                        <span><strong>${c.s?.[0]}K–${c.s?.[2]}K</strong></span>
                        <span style={{color:'#A1A1AA'}}>•</span>
                        <span>{c.tm}</span>
                      </div>
                    </div>
                  </div>
                  
                  {/* Why this matched - NEW */}
                  {reasons.length>0&&(
                    <div style={{marginTop:16,padding:12,background:'#f0fdf4',borderRadius:10,border:'1px solid #bbf7d0'}}>
                      <div style={{fontSize:12,fontWeight:700,color:'#16a34a',marginBottom:6}}>WHY THIS MATCHED</div>
                      {reasons.map((r,ri)=>(
                        <div key={ri} style={{fontSize:13,color:'#52525B',display:'flex',alignItems:'center',gap:6}}>
                          <span style={{color:'#4ECDC4'}}>✓</span> {r}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                
                {/* Big CTA button - NEW */}
                <div style={{padding:'16px 24px',background:i===0?'#4ECDC4':'#1a1a2e',color:'#fff',fontWeight:700,fontSize:15,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span>See action plan & outreach templates</span>
                  <span style={{fontSize:20}}>→</span>
                </div>
              </div>
            )})}

            {/* What you get when you click */}
            <div className="card fade-up" style={{padding:24,background:'linear-gradient(135deg,#E8F5E9,#fff)',marginBottom:24,border:'2px solid #bbf7d0'}}>
              <h3 style={{fontSize:18,fontWeight:700,marginBottom:16,display:'flex',alignItems:'center',gap:8}}>
                <span>📋</span> What's inside each career
              </h3>
              <div style={{display:'grid',gap:12}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <span style={{width:28,height:28,borderRadius:'50%',background:'#4ECDC4',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700}}>1</span>
                  <span style={{fontSize:14,color:'#52525B'}}><strong>4-week action plan</strong> — exactly what to do each week</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <span style={{width:28,height:28,borderRadius:'50%',background:'#4ECDC4',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700}}>2</span>
                  <span style={{fontSize:14,color:'#52525B'}}><strong>LinkedIn outreach templates</strong> — copy-paste messages</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <span style={{width:28,height:28,borderRadius:'50%',background:'#4ECDC4',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700}}>3</span>
                  <span style={{fontSize:14,color:'#52525B'}}><strong>Coffee chat questions</strong> — what to ask in conversations</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <span style={{width:28,height:28,borderRadius:'50%',background:'#4ECDC4',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700}}>4</span>
                  <span style={{fontSize:14,color:'#52525B'}}><strong>X-ray search</strong> — find the right people to reach out to</span>
                </div>
              </div>
              <p style={{fontSize:13,color:'#16a34a',marginTop:16,marginBottom:0,fontWeight:600}}>
                👆 Tap any career above to get started
              </p>
            </div>

            {/* Footer buttons */}
            <button className="btn btn-secondary pop" style={{width:'100%',marginBottom:12}} onClick={()=>setMode('browse')}>
              Browse all 180 careers
            </button>
            <button className="btn btn-ghost" style={{width:'100%'}} onClick={clearResults}>Start over</button>
          </div>
        </div>
      );
    }
  }
  
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
