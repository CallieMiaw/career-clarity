function App(){
  const[mode,setMode]=useState('home');
  const[step,setStep]=useState(0);
  const[filter,setFilter]=useState({cat:'',search:'',diff:''});
  const[expandedCareer,setExpandedCareer]=useState(null);
  
  // All user data
  const[d,setD]=useState({
    // Basic info
    name:'',
    email:'',
    currentRole:'',
    experience:'',
    education:'',
    currentIncome:'',
    
    // Satisfaction & timeline
    satisfaction:null,
    timeframe:'',
    financialFlex:'',
    riskTolerance:'',
    location:'',
    
    // Skills & energy
    energy:{}, // {questionId: 1-5 rating}
    workStyle:{}, // {questionId: selected option value}
    values:{}, // {questionId: 'a' or 'b'}
    
    // Constraints
    dealBreakers:[],
    fear:'',
    
    // Results
    results:[],
    topType:''
  });
  
  const u = x => setD(p=>({...p,...x}));
  
  // Calculate total steps for progress bar
  const totalSteps = 28; // Approximate total steps
  const progress = Math.min(100, (step / totalSteps) * 100);

  // Get all categories
  const categories = useMemo(()=>[...new Set(Object.values(C).map(c=>c.c))].sort(),[]);
  
  // Filter careers for browse mode
  const filtered = useMemo(()=>{
    return Object.entries(C).filter(([id,c])=>{
      if(filter.cat && c.c !== filter.cat) return false;
      if(filter.search && !c.t.toLowerCase().includes(filter.search.toLowerCase()) && !c.desc.toLowerCase().includes(filter.search.toLowerCase())) return false;
      if(filter.diff && c.d !== parseInt(filter.diff)) return false;
      return true;
    }).map(([id,c])=>({id,...c}));
  },[filter]);

  // ============================================
  // MATCHING ALGORITHM
  // ============================================
  
  const calculateResults = () => {
    const scores = {};
    const typeScores = {};
    
    // First, calculate personality type scores from energy questions
    Object.entries(d.energy).forEach(([qId, rating]) => {
      const q = energyQuestions.find(x => x.id === qId);
      if (q?.tags) {
        const mult = (rating - 3) / 2; // -1 to +1
        Object.entries(q.tags).forEach(([tag, weight]) => {
          typeScores[tag] = (typeScores[tag] || 0) + mult * weight;
        });
      }
    });
    
    // Add work style preferences to type scores
    Object.entries(d.workStyle).forEach(([qId, val]) => {
      const q = workStyleQuestions.find(x => x.id === qId);
      const opt = q?.opts.find(o => o.v === val);
      if (opt?.tags) {
        Object.entries(opt.tags).forEach(([tag, weight]) => {
          typeScores[tag] = (typeScores[tag] || 0) + weight;
        });
      }
    });
    
    // Add values to type scores
    Object.entries(d.values).forEach(([qId, choice]) => {
      const q = valueQuestions.find(x => x.id === qId);
      if (q) {
        const tag = choice === 'a' ? q.tagA : q.tagB;
        typeScores[tag] = (typeScores[tag] || 0) + 3;
      }
    });
    
    // Get top personality types
    const sortedTypes = Object.entries(typeScores).sort((a,b) => b[1] - a[1]);
    const topTypes = sortedTypes.slice(0, 5).map(([type]) => type);
    
    // Now score each career
    Object.entries(C).forEach(([id, c]) => {
      let score = 50; // Base score
      let reasons = [];
      
      // === PERSONALITY FIT (40% of score) ===
      
      // Match traits
      if (c.traits) {
        c.traits.forEach(trait => {
          const traitLower = trait.toLowerCase();
          topTypes.forEach((type, i) => {
            const weight = 5 - i; // Top type gets 5, second gets 4, etc.
            if (traitLower.includes(type.slice(0,4)) || type.includes(traitLower.slice(0,4))) {
              score += weight * 3;
              if (i === 0) reasons.push('Matches your top strength: ' + type);
            }
          });
        });
      }
      
      // Match values
      if (c.vals) {
        c.vals.forEach(val => {
          Object.entries(d.values).forEach(([qId, choice]) => {
            const q = valueQuestions.find(x => x.id === qId);
            const chosenTag = choice === 'a' ? q.tagA : q.tagB;
            if (val.includes(chosenTag) || chosenTag.includes(val)) {
              score += 8;
              reasons.push('Aligns with your value: ' + chosenTag);
            }
          });
        });
      }
      
      // === PRACTICAL FIT (30% of score) ===
      
      // Financial constraints
      const finFlex = financialFlex.find(f => f.v === d.financialFlex)?.flex || 2;
      if (finFlex === 1) { // Tight finances
        if (c.d === 3) score -= 25; // Hard transitions are risky
        if (c.s?.[0] === 0) score -= 30; // Zero starting salary is a no-go
        if (c.s?.[0] >= 50) score += 10; // Decent starting salary is good
      }
      
      // Risk tolerance
      const riskScore = riskTolerance.find(r => r.v === d.riskTolerance)?.score || 2;
      if (riskScore === 1 && c.d === 3) score -= 15;
      if (riskScore === 3 && c.c === 'Entrepreneurship') score += 10;
      
      // Timeline/urgency
      const urgency = timeframes.find(tf => tf.v === d.timeframe)?.urgency || 3;
      if (urgency >= 4 && c.d === 3) score -= 20; // Urgent + hard transition = bad match
      if (urgency >= 4 && c.d === 1) score += 10; // Urgent + easy transition = good match
      
      // Education match
      const eduScore = educationLevels.find(e => e.v === d.education)?.score || 3;
      if (c.d === 3 && eduScore < 3) score -= 10; // Hard careers often need degrees
      
      // Experience level affects transition difficulty perception
      const expScore = experienceLevels.find(e => e.v === d.experience)?.score || 3;
      if (expScore >= 4) score += 5; // More experience = more transferable skills
      
      // Location preference
      if (d.location === 'remote') {
        if (c.life?.r === 'Very common' || c.life?.r === 'Yes' || c.life?.r === 'Often' || c.life?.r === 'Common') {
          score += 10;
        } else if (c.life?.r === 'No' || c.life?.r === 'Rarely') {
          score -= 15;
        }
      }
      if (d.location === 'inperson' && (c.life?.r === 'No' || c.c === 'Trades' || c.c === 'Healthcare')) {
        score += 5;
      }
      
      // === DEAL BREAKERS (can eliminate careers) ===
      
      d.dealBreakers.forEach(dbId => {
        const db = dealBreakers.find(x => x.id === dbId);
        if (!db) return;
        
        switch(db.tag) {
          case 'meetings':
            if (c.truth?.some(t => t.toLowerCase().includes('meeting'))) score -= 25;
            if (c.t === 'Product Manager' || c.t === 'Project Manager') score -= 20;
            break;
          case 'unstable':
            if (c.s?.[0] === 0) score -= 35;
            if (c.truth?.some(t => t.toLowerCase().includes('famine') || t.toLowerCase().includes('commission') || t.toLowerCase().includes('variable'))) score -= 25;
            if (c.c === 'Entrepreneurship' || c.c === 'Creative') score -= 15;
            break;
          case 'sales':
            if (c.traits?.some(t => t.includes('sales'))) score -= 30;
            if (c.t.includes('Sales') || c.c === 'Entrepreneurship') score -= 25;
            break;
          case 'longhours':
            if (c.truth?.some(t => t.includes('60') || t.includes('80') || t.includes('hour'))) score -= 25;
            if (c.life?.h?.includes('60') || c.life?.h?.includes('70') || c.life?.h?.includes('80')) score -= 20;
            break;
          case 'travel':
            if (c.truth?.some(t => t.toLowerCase().includes('travel'))) score -= 20;
            break;
          case 'physical':
            if (c.c === 'Trades' || c.c === 'Outdoors') score -= 25;
            if (c.traits?.some(t => t.includes('physical'))) score -= 20;
            break;
          case 'desk':
            if (c.c === 'Tech' && c.life?.r !== 'No') score -= 10;
            break;
          case 'degree':
            if (c.d === 3) score -= 25;
            if (c.truth?.some(t => t.toLowerCase().includes('degree') || t.toLowerCase().includes('phd') || t.toLowerCase().includes('master'))) score -= 20;
            break;
          case 'stress':
            if (c.truth?.some(t => t.toLowerCase().includes('stress') || t.toLowerCase().includes('pressure'))) score -= 15;
            break;
          case 'management':
            if (c.traits?.some(t => t.includes('leader') || t.includes('manager'))) score -= 15;
            break;
          case 'hours':
            if (c.truth?.some(t => t.toLowerCase().includes('evening') || t.toLowerCase().includes('weekend') || t.toLowerCase().includes('night'))) score -= 20;
            break;
          case 'inoffice':
            if (c.life?.r === 'No' || c.life?.r === 'Rarely') score -= 15;
            break;
        }
      });
      
      // === TRANSITION FROM CURRENT ROLE ===
      
      // Bonus for related transitions
      const role = d.currentRole;
      if (role === 'software-engineer' && (c.c === 'Tech' || c.t.includes('Engineer'))) score += 15;
      if (role === 'designer' && (c.t.includes('Design') || c.c === 'Creative')) score += 15;
      if (role === 'marketing' && (c.t.includes('Market') || c.t.includes('Growth') || c.t.includes('Content'))) score += 15;
      if (role === 'sales' && (c.t.includes('Sales') || c.c === 'Business' || c.c === 'Entrepreneurship')) score += 10;
      if (role === 'healthcare' && c.c === 'Healthcare') score += 15;
      if (role === 'education' && (c.c === 'Education' || c.c === 'Coaching')) score += 15;
      if (role === 'finance' && c.c === 'Finance') score += 15;
      if (role === 'consulting' && (c.c === 'Consulting' || c.c === 'Business')) score += 10;
      
      // === DIFFICULTY ADJUSTMENT ===
      
      if (c.d === 1) score += 8; // Easy transitions get a small boost
      if (c.d === 3) score -= 5; // Hard transitions get a small penalty
      
      // Clamp score
      scores[id] = {
        score: Math.max(0, Math.min(100, Math.round(score))),
        reasons: [...new Set(reasons)].slice(0, 3)
      };
    });
    
    // Sort and get top results
    const sorted = Object.entries(scores)
      .sort((a, b) => b[1].score - a[1].score)
      .slice(0, 20)

    if (step === 100) return (
      <div style={s.wrap}><div style={s.cnt}>
        <div style={{...s.cardHero,textAlign:'left'}} className="fade">
          <p style={{fontSize:14,opacity:0.8,marginBottom:8}}>Hey {d.name} 👋</p>
          <h1 style={{...s.h1,color:'#fff',fontSize:28}}>Your career matches are ready</h1>
          <p style={{fontSize:15,opacity:0.9,lineHeight:1.6,marginBottom:0}}>
            Based on your energy patterns, values, work style, and constraints — here's what we found.
          </p>
        </div>

        {/* Fear response */}
        {d.fear && d.fear !== 'none' && (
          <div style={{...s.card,background:t.accL,border:'1px solid '+t.acc}} className="fade">
            <div style={{fontSize:13,fontWeight:600,color:t.acc,marginBottom:8}}>💭 ABOUT YOUR FEAR</div>
            <p style={{fontSize:15,color:t.text,lineHeight:1.6,marginBottom:0}}>{fearMessages[d.fear]}</p>
          </div>
        )}

        {/* Results */}
        {d.results.slice(0, 7).map((c, i) => (
          <div 
            key={c.id} 
            style={{...s.card, border: i === 0 ? '2px solid '+t.pri : '1px solid '+t.border, background: i === 0 ? t.priL : t.card}}
            className="fade"
          >
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontSize:12,fontWeight:700,color:t.pri}}>#{i+1}</span>
                <span style={{fontSize:11,padding:'4px 10px',borderRadius:12,background:catColors[c.c]||'#888',color:'#fff'}}>{c.c}</span>
              </div>
              <span style={{fontSize:13,fontWeight:600,color:i===0?t.pri:t.muted}}>{c.score}% match</span>
            </div>
            
            <div style={{fontSize:28,marginBottom:6}}>{c.e} <span style={{fontSize:22,fontWeight:600}}>{c.t}</span></div>
            <p style={{fontSize:15,color:t.sub,marginBottom:16,lineHeight:1.5}}>{c.desc}</p>
            
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
              <div style={{background:i===0?'#fff':t.bg,padding:14,borderRadius:12}}>
                <div style={{fontSize:12,color:t.muted,marginBottom:4}}>SALARY RANGE</div>
                <div style={{fontSize:17,fontWeight:700,color:t.pri}}>${c.s?.[0]}K – ${c.s?.[2]}K+</div>
              </div>
              <div style={{background:i===0?'#fff':t.bg,padding:14,borderRadius:12}}>
                <div style={{fontSize:12,color:t.muted,marginBottom:4}}>TRANSITION TIME</div>
                <div style={{fontSize:17,fontWeight:700}}>{c.tm}</div>
              </div>
            </div>
            
            <div style={{marginBottom:20}}>
              <div style={{fontSize:12,fontWeight:600,color:t.muted,marginBottom:10}}>⚠️ REALITY CHECK</div>
              {c.truth?.map((tb, j) => (
                <p key={j} style={{fontSize:14,color:t.sub,marginBottom:6,paddingLeft:12,borderLeft:'2px solid '+t.border}}>
                  {tb}
                </p>
              ))}
            </div>
            
            {c.res && (
              <div>
                <div style={{fontSize:12,fontWeight:600,color:t.muted,marginBottom:10}}>📚 GET STARTED</div>
                {c.res.slice(0, 3).map((r, j) => {
                  const [name, cost] = r.split('|');
                  return (
                    <div key={j} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:j<2?'1px solid '+t.border:'none'}}>
                      <span style={{fontSize:14}}>{name}</span>
                      <span style={{fontSize:14,fontWeight:600,color:t.pri}}>{cost}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        ))}

        <div style={s.card} className="fade">
          <h3 style={s.h3}>📌 Your action for tomorrow</h3>
          <p style={s.p}>
            Pick your #1 match (<strong>{d.results[0]?.t}</strong>). Find 3 people on LinkedIn who have that title. Send this message:
          </p>
          <div style={{background:t.bg,padding:16,borderRadius:12,fontSize:14,color:t.sub,lineHeight:1.6,fontStyle:'italic'}}>
            "Hi [Name], I'm a {currentRoles.find(r=>r.v===d.currentRole)?.l || 'professional'} exploring a move into {d.results[0]?.t?.toLowerCase()}. Would you have 15 minutes to share how you made the transition? No ask beyond the conversation. Thanks!"
          </div>
        </div>

        <button style={{...s.btn,...s.btnS}} onClick={()=>setMode('browse')}>
          Browse All 122 Careers
        </button>
        <button style={{...s.btn,...s.btnO}} onClick={()=>{
          setStep(0);
          setD({name:'',email:'',currentRole:'',experience:'',education:'',currentIncome:'',satisfaction:null,timeframe:'',financialFlex:'',riskTolerance:'',location:'',energy:{},workStyle:{},values:{},dealBreakers:[],fear:'',results:[],topType:''});
        }}>
          Retake Quiz
        </button>
        
        <p style={{...s.pSmall,textAlign:'center',marginTop:20}}>
          Found this helpful? Share it with a friend who's stuck.
        </p>
      </div></div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
